<style>
/* ============================================================ */
/* CSS OVERRIDES THEME + NOUVELLES EVOLUTIONS                  */
/* ============================================================ */

/* Evol 5: Masquage de l'analyse textuelle & Evol 3: Anciens boutons */
.budget-nav-btn { display: none !important; }
#analyseFinancierePanel, .budget-textual-analysis { display: none !important; }

/* Ajustement du conteneur du graphique */
#budgetChart { 
   position: relative; 
   height: 380px !important; /* Evol 4: Hauteur ajustée */
   border-radius: 14px !important; 
   border: 1px solid #e8ecf4 !important;
}

/* Style des nouveaux boutons injectés dynamiquement */
.new-chart-btn {
    padding: 6px 14px;
    border: 1px solid #cbd5e0;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    transition: all 0.2s;
    font-family: 'Plus Jakarta Sans', sans-serif;
}
.new-chart-btn.active {
    background: #3182ce;
    color: white;
    border-color: #3182ce;
    box-shadow: 0 2px 8px rgba(49, 130, 206, 0.3);
}
.new-chart-btn.inactive {
    background: white;
    color: #4a5568;
}
.new-chart-btn.inactive:hover {
    background: #f7fafc;
}

/* Conserver le thème d'origine de ton override */
#view-ca-budget > div > div:first-child { display: none !important; }
#view-ca-budget > div { display: block !important; border: none !important; box-shadow: none !important; background: transparent !important; height: auto !important; min-height: auto !important; overflow: visible !important; border-radius: 0 !important; }
#view-ca-budget > div > div:last-child { width: 100% !important; overflow: visible !important; }
#view-ca-budget > div > div:last-child > div:first-child { background: white !important; padding: 18px 22px !important; border-radius: 14px !important; border-left: 4px solid #6366f1 !important; box-shadow: 0 2px 12px rgba(99,102,241,0.06) !important; margin-bottom: 16px !important; border-bottom: none !important; }
#ctxBudgetTitle { font-size: 1.3em !important; font-weight: 900 !important; color: #1e293b !important; font-family: 'Plus Jakarta Sans', sans-serif !important; }
#ctxBudgetSubtitle { font-size: 0.82em !important; color: #64748b !important; font-weight: 600 !important; font-family: 'Plus Jakarta Sans', sans-serif !important; }
#view-ca-budget .sec-filter-group label { font-size: 0.68em !important; font-weight: 800 !important; color: #94a3b8 !important; text-transform: uppercase !important; letter-spacing: 0.5px !important; font-family: 'Plus Jakarta Sans', sans-serif !important; }
#view-ca-budget .sec-filter-group select { padding: 8px 12px !important; border: 1px solid #e8ecf4 !important; border-radius: 10px !important; background: #f8f9fd !important; font-family: 'Plus Jakarta Sans', sans-serif !important; font-weight: 600 !important; font-size: 0.85em !important; color: #1e293b !important; }
#view-ca-budget .sec-filter-group select:focus { border-color: #6366f1 !important; box-shadow: 0 0 0 3px rgba(99,102,241,0.1) !important; }
.budget-mgmt-row { display: flex; gap: 16px; width: 100%; margin-top: 6px; }
.budget-mgmt-item { font-size: 0.75em; color: #64748b; font-weight: 600; font-family: 'Plus Jakarta Sans', sans-serif; }
.budget-mgmt-item strong { color: #1e293b; font-weight: 800; }
#subFilterHiaCioa { display: none !important; }
#view-ca-budget .stat-card { border-radius: 14px !important; border: 1px solid #e8ecf4 !important; box-shadow: 0 2px 8px rgba(0,0,0,0.03) !important; font-family: 'Plus Jakarta Sans', sans-serif !important; }
#view-ca-budget .stat-card:hover { transform: translateY(-2px) !important; box-shadow: 0 6px 20px rgba(0,0,0,0.06) !important; }
#view-ca-budget .stat-card[style*="border-top: 4px solid #363795"] { border-top: 4px solid #6366f1 !important; }
#view-ca-budget .stat-value, #view-ca-budget .stat-title { font-family: 'Plus Jakarta Sans', sans-serif !important; }
#view-ca-budget .stat-value { font-weight: 900 !important; }
#view-ca-budget .stat-title { font-weight: 800 !important; }
#view-ca-budget #tableCaBudget { border-radius: 14px !important; border: 1px solid #e8ecf4 !important; overflow: hidden !important; }
#view-ca-budget #tableCaBudget th { background: #f8f9fd !important; font-family: 'Plus Jakarta Sans', sans-serif !important; font-weight: 800 !important; font-size: 0.7em !important; color: #94a3b8 !important; text-transform: uppercase !important; }
#view-ca-budget #tableCaBudget td { font-family: 'Plus Jakarta Sans', sans-serif !important; font-weight: 600 !important; }
#view-ca-budget #tableCaBudget tr:hover td { background: rgba(99,102,241,0.04) !important; }
#view-ca-budget .badge-perf.green { background: rgba(16,185,129,0.12) !important; color: #059669 !important; border-radius: 8px !important; font-weight: 800 !important; }
#view-ca-budget .badge-perf.red { background: rgba(239,68,68,0.12) !important; color: #dc2626 !important; border-radius: 8px !important; font-weight: 800 !important; }
</style>

<script>
/* ============================================================ */
/* BUDGET OVERRIDE - REECRITURE COMPLETE AVEC LES 5 EVOLUTIONS */
/* ============================================================ */

window.BUDGET_ENTITY_ORDER = ["HIIN", "CSS", "CIOB", "CIMO", "HPB"];
window.budgetViewMode = 'comparison'; // Actif par défaut

// Evol 2: Formatage lisible des nombres sans toLocaleString capricieux
window.formatMoney = function(v) {
  if (v === undefined || v === null || isNaN(v)) return "0";
  return Math.round(v).toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
};
window.fmtN = function(v) { return window.formatMoney(v); };
window.fmtK = function(v) { 
  if (!v || isNaN(v)) return '0 Kdh'; 
  return Math.round(v / 1000).toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ") + ' Kdh'; 
};
window.fmtKshort = function(v) { 
  if (!v || isNaN(v)) return '0'; 
  return Math.round(v / 1000).toString().replace(/\B(?=(\d{3})+(?!\d))/g, " "); 
};

// Remplacement complet de populateBudgetFilters pour masquer les anciennes entités (identique au tien)
window.populateBudgetFilters = function(caData) {
  var keys = Object.keys(caData);
  var excluded = ['ENTITÉ','ENTITE','TOTAL','RÉGION','REGION','HIA','CIOA','HIA CIOA','ALHIKMA','AL HIKMA','CIT','CID','PIL','HPG'];
  var entitesDispo = keys.filter(function(e) {
    var u = e.toUpperCase().trim();
    return !excluded.some(function(ex) { return u === ex; }) && !u.includes('TOTAL') && !u.includes('RÉGION') && !u.includes('REGION');
  });
  entitesDispo.sort(function(a, b) {
    var iA = window.BUDGET_ENTITY_ORDER.indexOf(a), iB = window.BUDGET_ENTITY_ORDER.indexOf(b);
    return (iA === -1 ? 99 : iA) - (iB === -1 ? 99 : iB);
  });
  var lE = document.getElementById('localBudgetEntite');
  if (lE) { var cv = lE.value; lE.innerHTML = ''; lE.add(new Option('TOUT', '')); entitesDispo.forEach(function(e) { lE.add(new Option(e, e)); }); if (cv && entitesDispo.indexOf(cv) > -1) lE.value = cv; }
  var lA = document.getElementById('localBudgetAnnee');
  if (lA && lA.options.length <= 1) { lA.innerHTML = '<option value="">TOUT</option>'; ["2026", "2025"].forEach(function(y) { lA.add(new Option(y, y)); }); var ca = document.getElementById('annee'); lA.value = (ca && ca.value) ? ca.value : "2026"; }
  var lT = document.getElementById('localBudgetTrimestre');
  if (lT && lT.options.length <= 1) { lT.innerHTML = '<option value="">TOUT</option>'; ['T1','T2','T3','T4'].forEach(function(t) { lT.add(new Option(t, t)); }); }
  var lM = document.getElementById('localBudgetMois');
  if (lM && lM.options.length <= 1) { lM.innerHTML = '<option value="">TOUT</option>'; window.monthOrder.forEach(function(m) { lM.add(new Option(m, m)); }); }
  var sub = document.getElementById('subFilterHiaCioa'); if (sub) sub.style.display = 'none';
};

// Evol 3: Injection dynamique des nouveaux boutons sur le graphique
function injectNewChartButtons() {
    var chartContainer = document.getElementById('budgetChart');
    if (!chartContainer) return;
    
    if (!document.getElementById('newChartBtnGroup')) {
        var btnGroup = document.createElement('div');
        btnGroup.id = 'newChartBtnGroup';
        btnGroup.style.cssText = 'position: absolute; top: 15px; right: 20px; z-index: 10; display: flex; gap: 8px;';
        btnGroup.innerHTML = `
            <button id="btnNewCaVsBudget" onclick="setBudgetMode('comparison')" class="new-chart-btn active">CA VS BUDGET</button>
            <button id="btnNewNN1" onclick="setBudgetMode('trend')" class="new-chart-btn inactive">N / N-1</button>
        `;
        chartContainer.appendChild(btnGroup);
    } else {
        var btnComp = document.getElementById('btnNewCaVsBudget');
        var btnTrend = document.getElementById('btnNewNN1');
        if (window.budgetViewMode === 'comparison') {
            btnComp.className = 'new-chart-btn active';
            btnTrend.className = 'new-chart-btn inactive';
        } else {
            btnComp.className = 'new-chart-btn inactive';
            btnTrend.className = 'new-chart-btn active';
        }
    }
}

window.setBudgetMode = function(mode) {
  window.budgetViewMode = mode;
  injectNewChartButtons();
  if (typeof updateCaBudgetView === 'function') updateCaBudgetView();
};

document.addEventListener('DOMContentLoaded', function() { 
  setTimeout(function() { 
    setBudgetMode('comparison'); 
  }, 600); 
});

function addBudgetMgmtRow() {
  var ex = document.getElementById('budgetMgmtRow'); if (ex) ex.remove();
  var header = document.querySelector('#view-ca-budget > div > div:last-child > div:first-child > div:first-child');
  if (!header) return;
  var resp = document.getElementById('budgetResp'), dir = document.getElementById('budgetDirMed');
  var row = document.createElement('div'); row.id = 'budgetMgmtRow'; row.className = 'budget-mgmt-row';
  row.innerHTML = '<div class="budget-mgmt-item"><i class="fas fa-user-tie" style="color:#6366f1;margin-right:4px;"></i>Resp: <strong>' + (resp ? resp.textContent : '--') + '</strong></div><div class="budget-mgmt-item"><i class="fas fa-stethoscope" style="color:#6366f1;margin-right:4px;"></i>Dir. Med: <strong>' + (dir ? dir.textContent : '--') + '</strong></div>';
  header.appendChild(row);
}

// ======================================================================================
// OVERRIDE COMPLET DE updateCaBudgetView (Intègre EVOL 1: Budget au réel)
// ======================================================================================
window.updateCaBudgetView = function() {
  var elTitle = document.getElementById('ctxBudgetTitle');
  if (elTitle) elTitle.textContent = elTitle.textContent.replace(/Grand[- ]?Sud/gi, 'Centre');
  addBudgetMgmtRow();
  injectNewChartButtons();

  const caData = window.rawData ? window.rawData.caData : {};
  if (!caData) return;
  
  populateBudgetFilters(caData);

  let selectedEntite = document.getElementById('localBudgetEntite') ? document.getElementById('localBudgetEntite').value : '';
  let trim = document.getElementById('localBudgetTrimestre') ? document.getElementById('localBudgetTrimestre').value : '';
  let mois = document.getElementById('localBudgetMois') ? document.getElementById('localBudgetMois').value : '';
  let selectedYear = document.getElementById('localBudgetAnnee') ? document.getElementById('localBudgetAnnee').value : '';
  
  let isComparison = (selectedYear === "" || selectedYear === "TOUT");
  let refYear = isComparison ? "2026" : selectedYear;
  let prevYear = (parseInt(refYear) - 1).toString();

  let activeMonths = [];
  if (mois && mois !== "") { activeMonths = [mois]; } 
  else if (trim && trim !== "") { activeMonths = window.quarters[trim]; } 
  else {
      const currentMonthIdx = new Date().getMonth();
      activeMonths = window.monthOrder.slice(0, currentMonthIdx + 1);
  }

  let mainRows = [];
  let totalRef = 0;
  let totalPrev = 0;
  let totalBudget = 0;
  
  Object.keys(caData).forEach(ent => {
      if (selectedEntite && ent !== selectedEntite) return;
      const upper = ent.toUpperCase();
      if (upper.includes('TOTAL') || upper.includes('RÉGION') || upper.includes('REGION') || ent === 'HIA' || ent === 'CIOA' || upper.includes('HIKMA') || ent === 'CIT' || ent === 'CID' || ent === 'PIL' || ent === 'HPG') return;

      const dRef = caData[ent] ? caData[ent][refYear] : null;
      const dPrevYearData = caData[ent] ? caData[ent][prevYear] : null;

      let valRef = 0, valPrev = 0, budRef = 0;
      
      activeMonths.forEach(m => {
          let currentCa = (dRef && dRef.caMensuel) ? (dRef.caMensuel[m] || 0) : 0;
          valRef += currentCa;
          
          // EVOL 1: Proratisation Dynamique - Budget ajouté UNIQUEMENT SI CA > 0
          if (currentCa > 0 && dRef && dRef.budgetAnnuel) {
              budRef += (dRef.budgetAnnuel / 12);
          }
      });

      if (activeMonths.length === 1) {
          const currentMonthStr = activeMonths[0];
          const monthIndex = window.monthOrder.indexOf(currentMonthStr);
          if (monthIndex === 0) {
              const prevYearStr = (parseInt(refYear) - 1).toString();
              if (caData[ent] && caData[ent][prevYearStr] && caData[ent][prevYearStr].caMensuel) {
                  valPrev = caData[ent][prevYearStr].caMensuel["DEC"] || 0;
              } else { valPrev = 0; }
          } else {
              const prevMonthStr = window.monthOrder[monthIndex - 1];
              if (dRef && dRef.caMensuel) { valPrev = dRef.caMensuel[prevMonthStr] || 0; }
          }
      } else {
          activeMonths.forEach(m => {
              if(dPrevYearData && dPrevYearData.caMensuel) valPrev += (dPrevYearData.caMensuel[m] || 0);
          });
      }
      
      totalRef += valRef;
      totalPrev += valPrev;
      totalBudget += budRef;

      mainRows.push({
          name: ent,
          caRef: valRef,
          caPrev: valPrev,
          budget: budRef,
          budgetAnnuel: dRef ? dRef.budgetAnnuel : 0,
          monthlyRef: dRef ? dRef.caMensuel : {},
          monthlyPrev: dPrevYearData ? dPrevYearData.caMensuel : {}
      });
  });
  
  const titleDisplay = selectedEntite || "Région Centre";
  var elTitle = document.getElementById('ctxBudgetTitle'); if (elTitle) elTitle.textContent = titleDisplay;
  
  let subtitlePeriod = "";
  if (mois) subtitlePeriod = "Mois : " + mois;
  else if (trim) subtitlePeriod = "Trimestre : " + trim;
  else {
      const monthNamesFR = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];
      subtitlePeriod = "YTD (Jan → " + monthNamesFR[new Date().getMonth()] + ")";
  }
  var elSub = document.getElementById('ctxBudgetSubtitle'); if (elSub) elSub.textContent = `Période : ${subtitlePeriod} ${isComparison ? ' - Comparatif 2025/2026' : '- Année '+refYear}`;

  var cardCa = document.getElementById('cardCaRealise'); if (cardCa) cardCa.textContent = window.formatMoney(totalRef);
  var cardBud = document.getElementById('cardBudget'); if (cardBud) cardBud.textContent = window.formatMoney(totalBudget);
  
  const elEvol = document.getElementById('cardCaEvol');
  if(elEvol) {
      if (totalPrev > 0) {
          let diff = totalRef - totalPrev;
          let pct = (diff / totalPrev) * 100;
          let labelComp = prevYear;
          if (activeMonths.length === 1) { labelComp = activeMonths[0] === 'JAN' ? "Déc " + (parseInt(refYear)-1) : "M-1"; }
          elEvol.textContent = `${diff >= 0 ? '+' : ''}${pct.toFixed(1)}% vs ${labelComp}`;
          elEvol.className = `evolution-tag ${diff >= 0 ? 'pos' : 'neg'}`;
      } else { elEvol.textContent = "-"; elEvol.className = `evolution-tag`; }
  }
  
  let valReste = totalBudget - totalRef;
  const elReste = document.getElementById('cardResteFaire');
  if(elReste && totalBudget > 0) {
      const cardContainer = document.getElementById('cardResteContainer');
      const cardTitle = document.getElementById('cardResteTitle');
      if (valReste > 0) {
          elReste.textContent = window.formatMoney(valReste);
          elReste.style.color = '#e74c3c';
          if(cardContainer) cardContainer.style.borderTopColor = '#e74c3c';
          if(cardTitle) cardTitle.textContent = "MANQUE À GAGNER";
      } else {
          elReste.textContent = "+" + window.formatMoney(Math.abs(valReste));
          elReste.style.color = '#27ae60';
          if(cardContainer) cardContainer.style.borderTopColor = '#27ae60';
          if(cardTitle) cardTitle.textContent = "OBJECTIF DÉPASSÉ";
      }
  }

  let realisation = totalBudget > 0 ? (totalRef / totalBudget) * 100 : 0;
  var elTaux = document.getElementById('cardTaux');
  if (elTaux) {
      elTaux.textContent = totalBudget > 0 ? realisation.toFixed(0) + " %" : "-";
      elTaux.className = `kpi-value ${realisation >= 100 ? 'green' : 'red'}`;
  }
  
  const diffVal = totalRef - totalBudget;
  var elEcart = document.getElementById('cardEcart');
  if (elEcart) {
      elEcart.textContent = totalBudget > 0 ? `${(diffVal >= 0 ? '+' : '')}${window.formatMoney(diffVal)}` : "-";
      elEcart.style.color = diffVal >= 0 ? '#27ae60' : '#e74c3c';
  }

  drawBudgetChartEvol(mainRows, selectedEntite, activeMonths, isComparison, refYear, prevYear);
  if (typeof updateCaTable === 'function') updateCaTable(mainRows, isComparison, refYear, prevYear);
  if (typeof updateSideWidgets === 'function') updateSideWidgets(mainRows);
};

// ======================================================================================
// OVERRIDE DE drawBudgetChart (Intègre EVOL 4: Ajustements Chart.js + Courbe + Y1 float)
// ======================================================================================
function drawBudgetChartEvol(mainRows, calcEntite, activeMonths, isComparison, refYear, prevYear) {
  const cvs = document.getElementById('caBudgetChart');
  if(!cvs) return;
  const ctx = cvs.getContext('2d');
  if (window.caChartInstance) window.caChartInstance.destroy();

  const isDark = document.body.classList.contains('dark-mode');
  const textColor = isDark ? '#e2e8f0' : '#1e293b';
  const gradientStd = ctx.createLinearGradient(0, 0, 0, 400); 
  gradientStd.addColorStop(0, '#6366f1'); gradientStd.addColorStop(1, '#a78bfa');
  const gradientBud = ctx.createLinearGradient(0, 0, 0, 400);
  gradientBud.addColorStop(0, '#f59e0b'); gradientBud.addColorStop(1, '#fbbf24');
  
  let config = {
      type: 'bar',
      data: { labels: [], datasets: [] },
      options: {
          responsive: true, maintainAspectRatio: false,
          layout: { padding: { top: 40, bottom: 10 } },
          animation: { duration: 1000, easing: 'easeOutQuart' },
          plugins: { 
              legend: { display: true, position: 'top', align: 'end', labels: { color: textColor, usePointStyle: true, font: { weight: '700', family: "'Plus Jakarta Sans',sans-serif", size: 12 } } }, 
              title: { display: true, text: 'Chiffre d\'affaires vs Budget (Kdh)', align: 'start', font: { size: 14, weight: '800', family: "'Plus Jakarta Sans',sans-serif" }, color: textColor, padding: { bottom: 20 } },
              tooltip: {
                  callbacks: {
                      label: function(context) {
                          let label = context.dataset.label || '';
                          if (label) label += ': ';
                          if (context.dataset.yAxisID === 'y1') {
                              label += (context.raw > 0 ? '+' : '') + context.raw + ' %';
                          } else {
                              label += window.formatMoney(context.raw);
                          }
                          return label;
                      }
                  }
              }
          },
          scales: { 
              y: { display: false, grid: { display: false } }, 
              x: { grid: { display: false }, border: { display: false }, ticks: { color: isDark ? '#64748b' : '#94a3b8', font: { size: 11, weight: '700', family: "'Plus Jakarta Sans',sans-serif" } } } 
          }
      }
  };
  
  if (!calcEntite || calcEntite === '') {
      mainRows.sort((a,b) => {
         let idxA = window.BUDGET_ENTITY_ORDER.indexOf(a.name); let idxB = window.BUDGET_ENTITY_ORDER.indexOf(b.name);
         if(idxA === -1) idxA = 99; if(idxB === -1) idxB = 99; return idxA - idxB;
      });
  }

  if (window.budgetViewMode === 'trend') {
      // --- VUE N / N-1 (Trend) + EVOL 4 Courbe de variation ---
      if (!calcEntite || calcEntite === '') {
          config.data.labels = mainRows.map(r => r.name);
          let dataRef = mainRows.map(r => r.caRef);
          let dataPrev = mainRows.map(r => r.caPrev);
          
          let variations = [];
          dataRef.forEach((val, idx) => {
              let prev = dataPrev[idx];
              if (prev > 0) variations.push( parseFloat((((val - prev) / prev) * 100).toFixed(1)) );
              else variations.push(0);
          });

          config.data.datasets.push({
              type: 'line', label: 'Évolution N / N-1 (%)', data: variations,
              borderColor: '#f59e0b', backgroundColor: '#f59e0b', borderWidth: 2, pointRadius: 5, pointBackgroundColor: '#fff', pointBorderColor: '#f59e0b', pointBorderWidth: 2, tension: 0.4,
              yAxisID: 'y1', order: 0,
              datalabels: { align: 'bottom', anchor: 'center', offset: 8, color: '#f59e0b', backgroundColor: isDark ? '#1e293b' : '#fff', borderRadius: 6, font: { weight: '800', size: 11, family: "'Plus Jakarta Sans',sans-serif" }, formatter: (v) => (v > 0 ? '+' : '') + v + '%' }
          });

          if (isComparison) {
              config.data.datasets.push({ type: 'bar', label: prevYear, data: dataPrev, backgroundColor: '#e2e8f0', borderRadius: 10, barPercentage: 0.55, categoryPercentage: 0.75, order: 2, datalabels: { color: isDark ? '#e2e8f0' : '#1e293b', anchor: 'end', align: 'top', offset: 2, font: { weight: '800', size: 12, family: "'Plus Jakarta Sans',sans-serif" }, formatter: (val) => val > 0 ? fmtKshort(val) : '' } });
          }
          config.data.datasets.push({ type: 'bar', label: refYear, data: dataRef, backgroundColor: gradientStd, borderRadius: 10, barPercentage: 0.55, categoryPercentage: 0.75, order: 1, datalabels: { color: isDark ? '#e2e8f0' : '#1e293b', anchor: 'end', align: 'top', offset: 2, font: { weight: '800', size: 12, family: "'Plus Jakarta Sans',sans-serif" }, formatter: (val) => val > 0 ? fmtKshort(val) : '' } });
          
      } else {
          config.data.labels = activeMonths;
          let aggRef = activeMonths.map(() => 0);
          let aggPrev = activeMonths.map(() => 0);
          
          mainRows.forEach(row => {
              activeMonths.forEach((m, i) => {
                  aggRef[i] += (row.monthlyRef ? row.monthlyRef[m] : 0) || 0;
                  aggPrev[i] += (row.monthlyPrev ? row.monthlyPrev[m] : 0) || 0;
              });
          });

          let variations = [];
          aggRef.forEach((val, idx) => {
              let p = aggPrev[idx]; 
              if (p > 0) variations.push( parseFloat((((val - p) / p) * 100).toFixed(1)) );
              else if (idx > 0 && aggRef[idx-1] > 0) variations.push( parseFloat((((val - aggRef[idx-1]) / aggRef[idx-1]) * 100).toFixed(1)) );
              else variations.push(0);
          });
          
          config.data.datasets.push({
              type: 'line', label: 'Variation (%)', data: variations,
              borderColor: '#f59e0b', backgroundColor: '#f59e0b', borderWidth: 2, pointRadius: 5, pointBackgroundColor: '#fff', pointBorderColor: '#f59e0b', pointBorderWidth: 2, tension: 0.4,
              yAxisID: 'y1', order: 0,
              datalabels: { align: 'bottom', anchor: 'center', offset: 8, color: '#f59e0b', backgroundColor: isDark ? '#1e293b' : '#fff', borderRadius: 6, font: { weight: '800', size: 11, family: "'Plus Jakarta Sans',sans-serif" }, formatter: (v) => (v > 0 ? '+' : '') + v + '%' }
          });
          
          if (isComparison) {
              config.data.datasets.push({ type: 'bar', label: prevYear, data: aggPrev, backgroundColor: '#e2e8f0', borderRadius: 10, barPercentage: 0.55, categoryPercentage: 0.75, order: 2, datalabels: { color: isDark ? '#e2e8f0' : '#1e293b', anchor: 'end', align: 'top', offset: 2, font: { weight: '800', size: 12, family: "'Plus Jakarta Sans',sans-serif" }, formatter: (val) => val > 0 ? fmtKshort(val) : '' } });
          }
          config.data.datasets.push({ type: 'bar', label: refYear, data: aggRef, backgroundColor: gradientStd, borderRadius: 10, barPercentage: 0.55, categoryPercentage: 0.75, order: 1, datalabels: { color: isDark ? '#e2e8f0' : '#1e293b', anchor: 'end', align: 'top', offset: 2, font: { weight: '800', size: 12, family: "'Plus Jakarta Sans',sans-serif" }, formatter: (val) => val > 0 ? fmtKshort(val) : '' } });
      }

  } else {
      // --- VUE CA VS BUDGET ---
      let labels = [], dataCa = [], dataBudget = [], rates = [];
      
      if (!calcEntite || calcEntite === '') {
          labels = mainRows.map(r => r.name);
          dataCa = mainRows.map(r => r.caRef);
          dataBudget = mainRows.map(r => r.budget);
          rates = mainRows.map(r => r.budget > 0 ? parseFloat(((r.caRef/r.budget)*100).toFixed(1)) : 0);
      } else {
          labels = activeMonths;
          let aggCa = activeMonths.map(() => 0);
          let aggBud = activeMonths.map(() => 0);
          
          mainRows.forEach(row => {
              activeMonths.forEach((m, i) => {
                  let monthCa = (row.monthlyRef ? row.monthlyRef[m] : 0) || 0;
                  aggCa[i] += monthCa;
                  // EVOL 1: Proratisation sur le graphe aussi
                  if (monthCa > 0 && row.budgetAnnuel > 0) {
                      aggBud[i] += (row.budgetAnnuel / 12);
                  }
              });
          });
          
          dataCa = aggCa; dataBudget = aggBud;
          rates = aggBud.map((b, i) => b > 0 ? parseFloat(((aggCa[i]/b)*100).toFixed(1)) : 0);
      }

      config.data.labels = labels;
      config.data.datasets.push({ type: 'line', label: 'Taux de Réalisation (%)', data: rates, borderColor: '#f59e0b', backgroundColor: '#f59e0b', borderWidth: 2, pointRadius: 5, pointBackgroundColor: '#fff', pointBorderColor: '#f59e0b', pointBorderWidth: 2, tension: 0.4, yAxisID: 'y1', order: 0, datalabels: { align: 'bottom', anchor: 'center', offset: 8, color: '#f59e0b', backgroundColor: isDark ? '#1e293b' : '#fff', borderRadius: 6, font: { weight: '800', size: 11, family: "'Plus Jakarta Sans',sans-serif" }, formatter: (v) => v > 0 ? v + '%' : '' } });
      config.data.datasets.push({ label: 'Budget', data: dataBudget, backgroundColor: gradientBud, borderRadius: 10, barPercentage: 0.55, categoryPercentage: 0.75, order: 2, datalabels: { color: isDark ? '#888' : '#666', anchor: 'end', align: 'top', offset: 2, font: { weight: '800', size: 12, family: "'Plus Jakarta Sans',sans-serif" }, formatter: (val) => val > 0 ? fmtKshort(val) : '' } });
      config.data.datasets.push({ label: 'CA Réalisé', data: dataCa, backgroundColor: gradientStd, borderRadius: 10, barPercentage: 0.55, categoryPercentage: 0.75, order: 1, datalabels: { color: textColor, anchor: 'end', align: 'top', offset: 2, font: { weight: '800', size: 12, family: "'Plus Jakarta Sans',sans-serif" }, formatter: (val) => val > 0 ? fmtKshort(val) : '' } });
  }

  // EVOL 4: Y1 float (min: -20) pour décoller la courbe
  config.options.scales.y1 = { 
      display: false, position: 'right', 
      min: -20 
  };

  window.caChartInstance = new Chart(ctx, config);
}
</script>
