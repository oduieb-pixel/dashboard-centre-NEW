<script>
/**
 * MODULE ACHAT v23 — DÉFINITIF
 * Corrections :
 * 1. Délai acheteur : recalculé depuis dateValid1/2/3 envoyés par GS
 * 2. Objectif réagit aux filtres mois/trimestre (proratisé sur mois sélectionnés)
 * 3. Mode 2025 : cartes 2026/engagé/écart/taux masquées, seul 2025 affiché
 * 4. Chaque montant à sa place (2026→carte2026, 2025→carte2025)
 * 5. Modals : graphique mensuel limité aux mois filtrés
 */

/* ═══════════ GLOBALES ══════════════════════════════════════════════ */
var globalAchatData     = [];
var globalAchatData2025 = [];
var globalObjectifs     = []; // [{site,famille,section,objectif,conso2025,taux}]

var currentAchatFiltered     = [];
var currentAchat2025Filtered = [];

var appChartMode = 'section';
var appTop10Mode = 'top10';
var currentModalRows  = [];
var currentModalTitle = 'detail';
var selectedTrims = [];

var MONTHS    = ['JAN','FEV','MAR','AVR','MAI','JUIN','JUIL','AOU','SEP','OCT','NOV','DEC'];
var MONTHS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
var QUARTERS  = {T1:['JAN','FEV','MAR'],T2:['AVR','MAI','JUIN'],T3:['JUIL','AOU','SEP'],T4:['OCT','NOV','DEC']};

var CLR = {
  budget:'#1a202c',c2026:'#319795',c2025:'#6366f1',engage:'#dd6b20',
  ink:'#1a202c',slate:'#718096',muted:'#a0aec0',border:'#e2e8f0',
  bg:'#f7fafc',rose:'#e53e3e',emerald:'#38a169',purple:'#805ad5',blue:'#3182ce'
};

var SITES_EXCLUS = new Set(['CIOB']);
var SITE_NORM = {'CSS':'CCS','CCS':'CCS','CCSS':'CCS','CIMOG':'CIMO','CIMO':'CIMO','HPBM':'HPB','HPB':'HPB','HIIN':'HIIN','CIOB':'CIOB'};
var SITE_DISPLAY = {'CCS':'CSS'}; // CCS affiché comme CSS

function nsJs(s){var u=String(s||'').trim().toUpperCase();return SITE_NORM[u]||u;}
function siteDisp(s){return SITE_DISPLAY[s]||s;}
function siteInternal(v){return v==='CSS'?'CCS':v;} // CSS→CCS pour filtrer

/* ═══════════ UTILITAIRES ══════════════════════════════════════════ */
function achSet(id,t){var e=document.getElementById(id);if(e)e.textContent=t;}
function achHTML(id,h){var e=document.getElementById(id);if(e)e.innerHTML=h;}
function hide(id){var e=document.getElementById(id);if(e)e.style.display='none';}
function show(id,d){var e=document.getElementById(id);if(e)e.style.display=(d||'');}
function pn(v){if(v==null||v==='')return 0;if(typeof v==='number')return isNaN(v)?0:v;var s=String(v).trim().replace(/\s/g,'').replace(',','.');return isNaN(parseFloat(s))?0:parseFloat(s);}
function fmtN(v){if(!v||isNaN(v))return'0';return Math.round(v).toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ');}
function fmtK(v){if(!v||isNaN(v))return'0 K';return Math.round(v/1000).toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ')+' K';}
function fmtD(v,d){if(v==null||isNaN(v))return'0';var p=Number(v).toFixed(d||0).split('.');p[0]=p[0].replace(/\B(?=(\d{3})+(?!\d))/g,' ');return p.join(',');}
function pd(s){if(!s)return null;try{var d=new Date(s);return isNaN(d.getTime())?null:d;}catch(e){return null;}}
function dbDays(a,b){var da=pd(a),db2=pd(b);if(!da||!db2)return null;var d=(db2-da)/864e5;return(d>=0&&d<500)?d:null;}
function getMoisISO(s){var d=pd(s);return d?MONTHS[d.getMonth()]:null;}
function getYTD(){var mi=new Date().getMonth(),r=[];for(var i=0;i<=mi;i++)r.push(MONTHS[i]);return r;}
function getAnnee(){var e=document.getElementById('achatFilterAnnee');return e?e.value:'';}

/* ═══════════ MOIS ACTIFS ════════════════════════════════════════ */
function getResolvedMonths(){
  var mv=(document.getElementById('achatFilterMois')||{}).value||'';
  if(mv==='TOUT') return MONTHS;
  if(mv) return[mv];
  if(selectedTrims.length>0){
    var r=[];selectedTrims.forEach(function(t){if(QUARTERS[t])r=r.concat(QUARTERS[t]);});return r;
  }
  return getYTD();
}

/* Ratio mois sélectionnés / 12 — pour proratiser l'objectif annuel */
function getRatioMois(){
  var ml=getResolvedMonths();
  return ml.length/12;
}

/* ═══════════ FILTRES ════════════════════════════════════════════ */
function getF(){
  var siteRaw=(document.getElementById('achatFilterSite')||{}).value||'';
  return{
    site       :siteInternal(siteRaw),
    annee      :getAnnee(),
    moisList   :getResolvedMonths(),
    famille    :(document.getElementById('achatFilterFamille')||{}).value||'',
    section    :(document.getElementById('achatFilterSection')||{}).value||'',
    fournisseur:(document.getElementById('achatFilterFournisseur')||{}).value||''
  };
}

function applyFilter(arr,f){
  return arr.filter(function(d){
    if(f.site&&d.site!==f.site)return false;
    if(d.mois&&f.moisList.indexOf(d.mois)<0)return false;
    if(f.famille&&d.famille!==f.famille)return false;
    if(f.section&&d.section!==f.section)return false;
    if(f.fournisseur&&d.fournisseur!==f.fournisseur)return false;
    return true;
  });
}

/* Objectif filtré par site/famille/section + PRORATISÉ par mois */
function getObjFiltre(f,famOvr,secOvr){
  var fam=famOvr!==undefined?famOvr:f.famille;
  var sec=secOvr!==undefined?secOvr:f.section;
  var ratio=getRatioMois();
  return globalObjectifs.filter(function(o){
    if(f.site&&o.site!==f.site)return false;
    if(fam&&o.famille!==fam)return false;
    if(sec&&o.section!==sec)return false;
    return true;
  }).reduce(function(s,o){return s+(o.objectif*ratio);},0);
}

/* ═══════════ CHARGEMENT ═════════════════════════════════════════ */
function loadAchatData(){
  achHTML('achatFilterDisplay','<span style="color:'+CLR.muted+'">Chargement…</span>');
  achHTML('appChartContainer','<div style="padding:60px;text-align:center;color:'+CLR.muted+'">Chargement…</div>');
  google.script.run
    .withSuccessHandler(onAchatLoaded)
    .withFailureHandler(function(e){achHTML('achatFilterDisplay','<span style="color:'+CLR.rose+'">Erreur : '+(e.message||e)+'</span>');})
    .getAchatData();
}

function onAchatLoaded(resp){
  if(!resp){achHTML('achatFilterDisplay','Aucune réponse');return;}

  function norm(arr,annee){
    return(arr||[]).map(function(r){
      r.site=nsJs(r.site);
      r.mois=r.mois||getMoisISO(r.dateCreation);
      r.annee=annee;
      r.isValide=!!r.isValide;
      r.isEngaged=!!r.isEngaged;
      r.consommation=r.isValide?r.montantTTC:0;

      /* ── Recalcul lastValidation depuis dateValid1/2/3 ──
         GS renvoie ces champs en ISO string.
         On prend la dernière date non nulle. */
      var vs=[r.dateValid1,r.dateValid2,r.dateValid3]
        .map(pd).filter(Boolean)
        .sort(function(a,b){return b-a;});
      r.lastValidation = vs.length>0 ? vs[0].toISOString() : null;

      return r;
    }).filter(function(r){return r.demande;});
  }

  globalAchatData     = norm(resp.data,    2026);
  globalAchatData2025 = norm(resp.data2025, 2025);
  globalObjectifs     = resp.objectifs||[];

  achSet('achatFilterDisplay','Actualisation : '+(resp.fromCache?'(cache) ':'')+resp.lastUpdate);
  populateAchatFilters();
  updateAchatView();
}

/* ═══════════ FILTRES UI ═════════════════════════════════════════ */
function populateAchatFilters(){
  /* Sites — CCS affiché comme CSS */
  var sSet=new Set();
  [globalAchatData,globalAchatData2025].forEach(function(a){a.forEach(function(d){sSet.add(d.site);});});
  var sites=[...sSet].filter(function(s){return s&&!SITES_EXCLUS.has(s);}).sort();
  var sel=document.getElementById('achatFilterSite');
  if(sel){
    sel.innerHTML='<option value="">TOUT</option>';
    sites.forEach(function(v){var lbl=siteDisp(v);sel.add(new Option(lbl,lbl));});
  }

  /* Familles */
  var fSet=new Set();
  [globalAchatData,globalAchatData2025].forEach(function(a){a.forEach(function(d){if(d.famille&&d.famille!=='Autres')fSet.add(d.famille);});});
  var sf=document.getElementById('achatFilterFamille');
  if(sf){sf.innerHTML='<option value="">TOUT</option>';[...fSet].sort().forEach(function(f){sf.add(new Option(f,f));});}

  /* Année — "Tout" par défaut */
  var sa=document.getElementById('achatFilterAnnee');
  if(sa){
    sa.innerHTML='<option value="">Tout (comparatif)</option><option value="2026">2026</option><option value="2025">2025</option>';
    sa.value='';
  }

  /* Mois */
  var sm=document.getElementById('achatFilterMois');
  if(sm){
    sm.innerHTML='<option value="TOUT">Tous les mois</option><option value="">YTD (Jan → mois en cours)</option>';
    MONTHS.forEach(function(m,i){sm.add(new Option(MONTHS_FR[i],m));});
    sm.value='';
  }

  updateAppSectionOptions();updateAppFournisseurOptions();renderTrimButtons();
}

function renderTrimButtons(){
  var z=document.getElementById('achatTrimBtns');if(!z)return;
  z.innerHTML=['T1','T2','T3','T4'].map(function(t){
    var a=selectedTrims.indexOf(t)>=0;
    return'<button id="trimBtn_'+t+'" onclick="toggleTrim(\''+t+'\')" style="border:1px solid '+(a?'#1a202c':'#e2e8f0')+';background:'+(a?'#1a202c':'#fff')+';color:'+(a?'#fff':'#4a5568')+';padding:6px 12px;border-radius:7px;font-weight:700;font-size:.8em;cursor:pointer;transition:all .15s">'+t+'</button>';
  }).join('');
}

function toggleTrim(t){
  var i=selectedTrims.indexOf(t);if(i>=0)selectedTrims.splice(i,1);else selectedTrims.push(t);
  var sm=document.getElementById('achatFilterMois');if(sm)sm.value='';
  renderTrimButtons();updateAchatView();
}

function updateAppSectionOptions(){
  var fam=(document.getElementById('achatFilterFamille')||{}).value||'';
  var sel=document.getElementById('achatFilterSection');if(!sel)return;
  var old=sel.value;sel.innerHTML='<option value="">TOUT</option>';
  var secs=new Set();
  [globalAchatData,globalAchatData2025].forEach(function(a){a.forEach(function(d){if(fam&&d.famille!==fam)return;if(d.section&&d.section!=='Non défini')secs.add(d.section);});});
  [...secs].sort().forEach(function(s){sel.add(new Option(s,s));});
  if(old&&[...sel.options].some(function(o){return o.value===old;}))sel.value=old;
}
function updateAppFournisseurOptions(){
  var fam=(document.getElementById('achatFilterFamille')||{}).value||'';
  var sec=(document.getElementById('achatFilterSection')||{}).value||'';
  var sel=document.getElementById('achatFilterFournisseur');if(!sel)return;
  var old=sel.value;sel.innerHTML='<option value="">TOUT</option>';
  var frs=new Set();
  [globalAchatData,globalAchatData2025].forEach(function(a){a.forEach(function(d){if(fam&&d.famille!==fam)return;if(sec&&d.section!==sec)return;if(d.fournisseur&&d.fournisseur!=='Non défini')frs.add(d.fournisseur);});});
  [...frs].sort().forEach(function(f){sel.add(new Option(f,f));});
  if(old&&[...sel.options].some(function(o){return o.value===old;}))sel.value=old;
}

function resetAchatFilters(){
  ['achatFilterSite','achatFilterFamille','achatFilterSection','achatFilterFournisseur'].forEach(function(id){var e=document.getElementById(id);if(e)e.value='';});
  var sa=document.getElementById('achatFilterAnnee');if(sa)sa.value='';
  var sm=document.getElementById('achatFilterMois');if(sm)sm.value='';
  selectedTrims=[];renderTrimButtons();
  updateAppSectionOptions();updateAppFournisseurOptions();updateAchatView();
}

/* ═══════════ UPDATE ══════════════════════════════════════════════ */
function updateAchatView(){
  if(!globalAchatData.length&&!globalAchatData2025.length)return;
  var f=getF();
  if(f.annee==='2025'){
    currentAchatFiltered     = applyFilter(globalAchatData2025,f);
    currentAchat2025Filtered = [];
  } else if(f.annee==='2026'){
    currentAchatFiltered     = applyFilter(globalAchatData,f);
    currentAchat2025Filtered = applyFilter(globalAchatData2025,f);
  } else {
    currentAchatFiltered     = applyFilter(globalAchatData,f);
    currentAchat2025Filtered = applyFilter(globalAchatData2025,f);
  }
  renderAppKPIs();renderAppChart();renderAppTop10();
}

/* ═══════════ KPIs ════════════════════════════════════════════════ */
function renderAppKPIs(){
  var f=getF();
  var annee=f.annee;

  /* ── Consommations ── */
  var conso26 = currentAchatFiltered.filter(function(d){return d.isValide;}).reduce(function(s,d){return s+d.montantTTC;},0);
  var engage26= currentAchatFiltered.filter(function(d){return d.isEngaged;}).reduce(function(s,d){return s+d.montantTTC;},0);
  var nE      = currentAchatFiltered.filter(function(d){return d.isEngaged;}).length;
  /* conso25 = depuis currentAchat2025Filtered en mode 2026/tout,
               depuis currentAchatFiltered en mode 2025 */
  var conso25 = annee==='2025'
    ? currentAchatFiltered.reduce(function(s,d){return s+d.consommation;},0)
    : currentAchat2025Filtered.reduce(function(s,d){return s+d.consommation;},0);

  /* ── Objectif proratisé ── */
  var obj = annee==='2025' ? 0 : getObjFiltre(f,'','');

  /* ── Affichage selon l'année ── */
  if(annee==='2025'){
    /* Mode 2025 : afficher seulement conso2025. Masquer 2026, objectif, écart, taux */
    achSet('appKpiConso25', fmtN(conso25)+' MAD');
    achSet('appKpiConso',   '—');
    achSet('appKpiEngage',  '—');achSet('appKpiEngageNb','');
    achSet('appKpiObj',     '—');
    achSet('appKpiEcart',   '—');achSet('appKpiEcartPct','');
    achSet('appKpiTaux',    '—');
    var fill=document.getElementById('appKpiTauxFill');if(fill)fill.style.width='0%';
    achSet('appKpiVariation','—');achSet('appKpiVariationSub','');
    var ie=document.getElementById('appInsight');if(ie)ie.innerHTML='';
    /* Délais sur données 2025 */
    renderDelais();
    return;
  }

  /* Mode 2026 ou Tout */
  var taux = obj>0?((conso26+engage26)/obj*100):0;
  var ecart= obj-(conso26+engage26);
  var variation=(conso25>0)?((conso26-conso25)/conso25*100):null;
  var variTxt=variation==null?'—':(variation>0?'+':'')+fmtD(variation,1)+' %';
  var variCol=variation==null?CLR.muted:(variation>0?CLR.rose:CLR.emerald);

  achSet('appKpiObj',       obj>0?fmtN(obj)+' MAD':'—');
  achSet('appKpiConso',     fmtN(conso26)+' MAD');
  achSet('appKpiEngage',    fmtN(engage26)+' MAD');
  achSet('appKpiEngageNb',  nE+' DA');
  achSet('appKpiConso25',   conso25>0?fmtN(conso25)+' MAD':'—');
  achSet('appKpiVariation', variTxt);
  var variEl=document.getElementById('appKpiVariation');if(variEl)variEl.style.color=variCol;
  achSet('appKpiVariationSub',variation!=null?fmtN(conso26-conso25)+' MAD':'');
  achSet('appKpiEcart',     obj>0?fmtN(ecart)+' MAD':'—');
  achSet('appKpiEcartPct',  obj>0?fmtD(taux,1)+'% consommé':'');
  achSet('appKpiTaux',      obj>0?fmtD(taux,1)+' %':'—');
  var fill=document.getElementById('appKpiTauxFill');
  if(fill){fill.style.width=(obj>0?Math.min(taux,100):0)+'%';fill.style.background=taux>100?CLR.rose:taux>85?CLR.engage:CLR.c2026;}
  var ie=document.getElementById('appInsight');
  if(ie)ie.innerHTML=obj>0?insight(taux,obj,conso26+engage26):'';

  renderDelais();
}

function renderDelais(){
  var f=getF();
  /* Délais calculés sur currentAchatFiltered (quelle que soit l'année) */
  var dDA=[],dAch=[],dBC=[];
  currentAchatFiltered.forEach(function(d){
    var v1=dbDays(d.dateCreation,d.dateValidBC);
    if(v1!=null)dDA.push(v1);
    /* Délai acheteur : lastValidation (dernière validation DA) → dateCreaBC */
    if(d.lastValidation&&d.dateCreaBC){
      var v2=dbDays(d.lastValidation,d.dateCreaBC);
      if(v2!=null)dAch.push(v2);
    }
    var v3=dbDays(d.dateCreaBC,d.dateValidBC);
    if(v3!=null)dBC.push(v3);
  });
  function avg(a){return a.length>0?(a.reduce(function(x,y){return x+y;},0)/a.length):null;}
  achSet('appKpiDelaiDA',       avg(dDA)!=null?fmtD(avg(dDA),1)+' j':'—');
  achSet('appKpiDelaiAcheteur', avg(dAch)!=null?fmtD(avg(dAch),1)+' j':'—');
  achSet('appKpiDelaiBC',       avg(dBC)!=null?fmtD(avg(dBC),1)+' j':'—');
  var totSav=currentAchatFiltered.filter(function(d){return d.isValide&&d.valeurEcon>0;}).reduce(function(s,d){return s+d.valeurEcon;},0);
  var totOff=currentAchatFiltered.filter(function(d){return d.isValide&&d.montantOffre>0;}).reduce(function(s,d){return s+d.montantOffre;},0);
  achSet('appKpiSaving',    fmtN(totSav)+' MAD');
  achSet('appKpiSavingPct', fmtD(totOff>0?(totSav/totOff*100):0,1)+"% d'économie");
}

function insight(taux,obj,conso){
  var mi=new Date().getMonth(),pA=((mi+1)/12*100),t='';
  if(taux>100)t='Dépassement de '+fmtN(Math.abs(obj-conso))+' MAD';
  else if(taux>pA*1.1)t='Rythme supérieur au calendrier ('+fmtD(taux,0)+'% vs '+fmtD(pA,0)+'%)';
  else if(taux<pA*0.7)t='Consommation maîtrisée';
  else t='Conforme au calendrier';
  t+=' — '+MONTHS_FR[mi]+' ('+fmtD(pA,0)+'% de l\'année)';
  var col=taux>100?CLR.rose:taux>pA*1.1?CLR.engage:taux<pA*0.7?CLR.emerald:CLR.blue;
  return'<div style="padding:10px 16px;background:#fff;border-radius:10px;border:1px solid '+CLR.border+';border-left:3px solid '+col+';font-size:.84em;font-weight:600;color:'+CLR.slate+'">'+t+'</div>';
}

/* ═══════════ GRAPHIQUE ══════════════════════════════════════════ */
function setAppChartMode(m){
  appChartMode=m;
  ['btnAppFamille','btnAppSection'].forEach(function(id){
    var b=document.getElementById(id);if(!b)return;
    var a=(m==='famille'&&id==='btnAppFamille')||(m==='section'&&id==='btnAppSection');
    b.style.background=a?'#fff':'transparent';b.style.color=a?CLR.ink:CLR.slate;
    b.style.boxShadow=a?'0 1px 3px rgba(0,0,0,.1)':'none';
  });
  achSet('appChartTitle',m==='famille'?'Consommation par Famille':'Consommation par Section');
  renderAppChart();
}

function renderAppChart(){
  var f=getF();
  /* Agréger */
  var c26f={},c26s={},e26f={},e26s={},c25f={},c25s={},secToFam={};
  currentAchatFiltered.forEach(function(d){
    if(d.famille&&d.famille!=='Autres'){
      c26f[d.famille]=(c26f[d.famille]||0)+d.consommation;
      if(d.isEngaged)e26f[d.famille]=(e26f[d.famille]||0)+d.montantTTC;
    }
    if(d.section&&d.section!=='Non défini'){
      c26s[d.section]=(c26s[d.section]||0)+d.consommation;
      if(d.isEngaged)e26s[d.section]=(e26s[d.section]||0)+d.montantTTC;
      if(d.famille)secToFam[d.section]=d.famille;
    }
  });
  /* En mode 2025, les données courantes sont 2025 → remplir c25 aussi */
  var src25=f.annee==='2025'?currentAchatFiltered:currentAchat2025Filtered;
  src25.forEach(function(d){
    if(d.famille&&d.famille!=='Autres')c25f[d.famille]=(c25f[d.famille]||0)+d.consommation;
    if(d.section&&d.section!=='Non défini'){
      c25s[d.section]=(c25s[d.section]||0)+d.consommation;
      if(d.famille)secToFam[d.section]=d.famille;
    }
  });

  /* Union de toutes familles/sections connues */
  var allFams=new Set(),allSecs=new Set();
  [globalAchatData,globalAchatData2025].forEach(function(arr){
    arr.forEach(function(d){
      if(d.famille&&d.famille!=='Autres')allFams.add(d.famille);
      if(d.section&&d.section!=='Non défini'){allSecs.add(d.section);if(d.famille)secToFam[d.section]=d.famille;}
    });
  });
  globalObjectifs.forEach(function(o){if(o.famille)allFams.add(o.famille);if(o.section){allSecs.add(o.section);if(o.famille)secToFam[o.section]=o.famille;}});

  if(appChartMode==='section'){
    var filtSecs=[...allSecs];
    if(f.famille)filtSecs=filtSecs.filter(function(s){return secToFam[s]===f.famille;});
    if(f.section)filtSecs=filtSecs.filter(function(s){return s===f.section;});
    var rows=filtSecs.map(function(sec){
      var fam=secToFam[sec]||'';
      var obj=f.annee==='2025'?0:getObjFiltre(f,fam,sec);
      return{key:sec,famille:fam,obj:obj,conso2026:c26s[sec]||0,engage:e26s[sec]||0,conso2025:c25s[sec]||0,isFamille:false};
    }).filter(function(r){return r.conso2026>0||r.conso2025>0;})
      .sort(function(a,b){return(b.conso2026+b.conso2025)-(a.conso2026+a.conso2025);});
    window._chartRows=rows;renderGrid('appChartContainer',rows,f.annee);
  } else {
    var filtFams=[...allFams];
    if(f.famille)filtFams=filtFams.filter(function(fa){return fa===f.famille;});
    var fm={};
    filtFams.forEach(function(fam){
      var obj=f.annee==='2025'?0:getObjFiltre(f,fam,'');
      fm[fam]={key:fam,obj:obj,conso2026:c26f[fam]||0,engage:e26f[fam]||0,conso2025:c25f[fam]||0,isFamille:true,sections:{}};
      var filtSecsF=[...allSecs].filter(function(s){return secToFam[s]===fam;});
      if(f.section)filtSecsF=filtSecsF.filter(function(s){return s===f.section;});
      filtSecsF.forEach(function(sec){
        var sObj=f.annee==='2025'?0:getObjFiltre(f,fam,sec);
        fm[fam].sections[sec]={key:sec,famille:fam,obj:sObj,conso2026:c26s[sec]||0,engage:e26s[sec]||0,conso2025:c25s[sec]||0,isFamille:false};
      });
    });
    var allRows=[];
    Object.values(fm).filter(function(r){return r.conso2026>0||r.conso2025>0;})
      .sort(function(a,b){return(b.conso2026+b.conso2025)-(a.conso2026+a.conso2025);})
      .forEach(function(fmR){
        allRows.push(fmR);
        Object.values(fmR.sections).filter(function(s){return s.conso2026>0||s.conso2025>0;})
          .sort(function(a,b){return(b.conso2026+b.conso2025)-(a.conso2026+a.conso2025);})
          .forEach(function(s){allRows.push(s);});
      });
    window._chartRows=allRows;renderHierarchical('appChartContainer',allRows,f.annee);
  }
}

/* ═══════════ RENDU GRILLE ════════════════════════════════════════ */
function gridHeader(annee){
  var lbl26=annee==='2025'?'—':'Conso 2026';
  var lbl25=annee==='2026'?'—':'Conso 2025';
  var lblObj=annee==='2025'?'—':'Objectif';
  return'<div style="display:flex;gap:8px;padding:8px 12px;border-bottom:2px solid '+CLR.border+';margin-bottom:8px;font-size:.68em;font-weight:700;color:'+CLR.slate+';text-transform:uppercase">'
    +'<div style="flex:2.5">Libellé</div>'
    +'<div style="flex:1;text-align:right;color:'+CLR.budget+'">'+lblObj+'</div>'
    +'<div style="flex:1;text-align:right;color:'+CLR.c2026+'">'+lbl26+'</div>'
    +'<div style="flex:1;text-align:right;color:'+CLR.c2025+'">'+lbl25+'</div>'
    +'<div style="flex:2">Progression</div>'
    +'<div style="flex:.5;text-align:right">Taux</div></div>';
}

function gridRow(r,i,isSub,annee){
  var obj=annee==='2025'?0:(r.obj||0);
  var consumed=(r.conso2026||0)+(r.engage||0);
  var p=obj>0?Math.min(consumed/obj*100,150):0;
  var n1=obj>0?Math.min((r.conso2025||0)/obj*100,150):0;
  var bc=p>100?CLR.rose:p>85?CLR.engage:CLR.c2026;

  /* En mode 2025 : 2025 en "2026 slot", pas de valeur 2026 */
  var val26,val25,col26,col25;
  if(annee==='2025'){
    val26='—';col26=CLR.muted;
    val25=r.conso2025>0?fmtK(r.conso2025):'—';col25=r.conso2025>0?CLR.c2025:CLR.muted;
  } else {
    val26=r.conso2026>0?fmtK(r.conso2026):'—';col26=r.conso2026>0?CLR.c2026:CLR.muted;
    val25=r.conso2025>0?fmtK(r.conso2025):'—';col25=r.conso2025>0?CLR.c2025:CLR.muted;
  }

  var pad=isSub?'7px 12px 7px 32px':'12px';
  var bg=isSub?'border-left:2px dashed '+CLR.border+';margin-left:16px;':'background:linear-gradient(90deg,#faf5ff,#fff);border-left:4px solid '+CLR.purple+';';
  var fw=isSub?600:800;var colLabel=isSub?CLR.slate:CLR.purple;var fs=isSub?'.82em':'.9em';var mt=isSub?'0':'8px';

  return'<div onclick="openChartModal('+i+')" style="display:flex;gap:8px;align-items:center;padding:'+pad+';cursor:pointer;border-radius:8px;'+bg+'margin-top:'+mt+';border-bottom:1px solid #f7fafc;transition:all .15s" onmouseover="this.style.transform=\'translateX(3px)\'" onmouseout="this.style.transform=\'translateX(0)\'">'
    +'<div style="flex:2.5;font-weight:'+fw+';color:'+colLabel+';font-size:'+fs+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(isSub?'↳ ':'')+r.key+'</div>'
    +'<div style="flex:1;text-align:right;font-weight:700;font-size:.84em;color:'+CLR.budget+'">'+(annee==='2025'?'—':(obj>0?fmtK(obj):'—'))+'</div>'
    +'<div style="flex:1;text-align:right;font-weight:800;font-size:.84em;color:'+col26+'">'+val26+'</div>'
    +'<div style="flex:1;text-align:right;font-weight:600;font-size:.82em;color:'+col25+'">'+val25+'</div>'
    +'<div style="flex:2;position:relative;height:'+(isSub?'14px':'22px')+';background:#edf2f7;border-radius:4px">'
      +(p>0&&annee!=='2025'?'<div style="height:100%;width:'+Math.min(p,100)+'%;background:'+bc+';border-radius:4px;transition:width .4s"></div>':'')
      +(n1>0&&annee!=='2025'?'<div style="position:absolute;top:0;left:'+Math.min(n1,100)+'%;width:2px;height:100%;background:'+CLR.c2025+';opacity:.5"></div>':'')
    +'</div>'
    +'<div style="flex:.5;text-align:right;font-weight:800;color:'+(p>100?CLR.rose:p>85?CLR.engage:CLR.ink)+';font-size:.82em">'+(obj>0&&annee!=='2025'?fmtD(p,0)+'%':'—')+'</div></div>';
}

function renderGrid(cid,rows,annee){
  if(!rows.length){achHTML(cid,'<div style="padding:40px;text-align:center;color:'+CLR.muted+'">Aucune donnée</div>');return;}
  var h=gridHeader(annee);
  rows.forEach(function(r,i){h+=gridRow(r,i,false,annee);});
  achHTML(cid,h);
}

function renderHierarchical(cid,allRows,annee){
  if(!allRows.length){achHTML(cid,'<div style="padding:40px;text-align:center;color:'+CLR.muted+'">Aucune donnée</div>');return;}
  var h=gridHeader(annee);
  allRows.forEach(function(r,i){h+=gridRow(r,i,!r.isFamille,annee);});
  achHTML(cid,h);
}

/* ═══════════ MODAL ═══════════════════════════════════════════════ */
function kpi(label,value,color,sub){
  return'<div style="background:#fff;padding:14px 16px;border-radius:12px;border:1px solid '+CLR.border+';box-shadow:0 1px 4px rgba(0,0,0,.05)">'
    +'<div style="font-size:.62em;color:'+CLR.muted+';text-transform:uppercase;font-weight:700;letter-spacing:.4px;margin-bottom:6px">'+label+'</div>'
    +'<div style="font-size:1.06em;font-weight:800;color:'+color+'">'+value+'</div>'
    +(sub?'<div style="font-size:.69em;color:'+CLR.muted+';margin-top:4px;font-weight:500">'+sub+'</div>':'')
    +'</div>';
}

function openChartModal(idx){
  var rows=window._chartRows||[];if(idx<0||idx>=rows.length)return;
  var row=rows[idx];var f=getF();var annee=f.annee;

  achSet('modalTitle',row.key);

  currentModalTitle='modal_'+String(row.key).replace(/[^a-z0-9]/gi,'_').substring(0,30);

  /* Lignes filtrées strictement */
  currentModalRows=currentAchatFiltered.filter(function(d){
    return row.isFamille?(d.famille===row.key):(d.section===row.key);
  });
  var rows25=currentAchat2025Filtered.filter(function(d){
    return row.isFamille?(d.famille===row.key):(d.section===row.key);
  });
  if(annee==='2025')rows25=currentModalRows;

  var periodeLabel=f.moisList.length<12?' ('+f.moisList.join(', ')+')':"";

  var h='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px">';
  if(annee==='2025'){
    h+=kpi('Consommation 2025'+periodeLabel,fmtN(row.conso2025)+' MAD',CLR.c2025,'');
    h+=kpi('—','—',CLR.muted,'');
    h+=kpi('—','—',CLR.muted,'');
  } else {
    h+=kpi('Objectif'+periodeLabel,obj>0?fmtN(obj)+' MAD':'—',CLR.budget,row.conso2025>0?'Base 2025 : '+fmtN(row.conso2025)+' MAD':'');
    h+=kpi('Consommation 2026'+periodeLabel,row.conso2026>0?fmtN(row.conso2026)+' MAD':'—',CLR.c2026,obj>0?fmtD(consumed/obj*100,1)+'% de l\'objectif':'');
    h+=kpi('Consommation 2025'+periodeLabel,row.conso2025>0?fmtN(row.conso2025)+' MAD':'—',CLR.c2025,'');
  }
  h+='</div>';
  if(annee!=='2025'){
    var ev=row.conso2025>0?((consumed-row.conso2025)/row.conso2025*100):null;
    var evC=ev==null?CLR.muted:(ev>0?CLR.rose:CLR.emerald);
    var evT=ev==null?'—':(ev>0?'+':'')+fmtD(ev,1)+' %';
    h+='<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px">';
    h+=kpi('Variation N/N–1',evT,evC,ev!=null?fmtN(consumed-row.conso2025)+' MAD':'');
    h+=kpi('Écart Objectif',obj>0?fmtN(obj-consumed)+' MAD':'—',obj-consumed<0?CLR.rose:CLR.blue,'');
    h+='</div>';
  } else {
    h+='<div style="margin-bottom:18px"></div>';
  }

  h+='<div style="background:#fff;border:1px solid '+CLR.border+';border-radius:12px;padding:16px;margin-bottom:18px">'
    +'<div style="font-weight:700;color:'+CLR.ink+';font-size:.88em;text-transform:uppercase;letter-spacing:.3px;margin-bottom:12px">Suivi mensuel'+periodeLabel+'</div>'
    +'<div style="height:250px;position:relative"><canvas id="modalMonthlyChart"></canvas></div></div>';

  if(annee!=='2025'){
    var val=currentModalRows.filter(function(d){return d.isValide;});
    if(val.length>0){h+='<div style="font-weight:700;color:'+CLR.c2026+';margin-bottom:8px;font-size:.84em;text-transform:uppercase">Consommation 2026'+periodeLabel+' ('+val.length+')</div>';h+=rTable(val);}
    var eng2=currentModalRows.filter(function(d){return d.isEngaged;});
    if(eng2.length>0){h+='<div style="font-weight:700;color:'+CLR.engage+';margin:14px 0 8px;font-size:.84em;text-transform:uppercase">Engagé 2026'+periodeLabel+' ('+eng2.length+')</div>';h+=rTable(eng2);}
  } else if(currentModalRows.length>0){
    h+='<div style="font-weight:700;color:'+CLR.c2025+';margin-bottom:8px;font-size:.84em;text-transform:uppercase">Consommation 2025'+periodeLabel+' ('+currentModalRows.length+')</div>';
    h+=rTable(currentModalRows);
  }

  achHTML('modalContent',h);
  document.getElementById('achatDetailModal').style.display='flex';
  setTimeout(function(){rModalChart(row,rows25,obj,f);},150);
}

function rModalChart(row,rows25,obj,f){
  var c=document.getElementById('modalMonthlyChart');if(!c||typeof Chart==='undefined')return;
  /* Répartir objectif proportionnellement sur les mois filtrés */
  var nb=f.moisList.length||12;
  var b=new Array(12).fill(0);
  if(obj>0)f.moisList.forEach(function(m){var i=MONTHS.indexOf(m);if(i>=0)b[i]=Math.round(obj/nb/1000);});
  var d26=new Array(12).fill(0),d25=new Array(12).fill(0);
  currentModalRows.forEach(function(d){if(!d.isValide)return;var i=MONTHS.indexOf(d.mois);if(i>=0)d26[i]+=d.montantTTC;});
  rows25.forEach(function(d){var i=MONTHS.indexOf(d.mois);if(i>=0)d25[i]+=d.consommation;});

  /* Limiter aux mois filtrés */
  var lb=[],bd=[],sd=[],nd=[];
  f.moisList.forEach(function(m){
    var i=MONTHS.indexOf(m);if(i<0)return;
    if(b[i]>0||d26[i]>0||d25[i]>0){lb.push(m);bd.push(b[i]);sd.push(Math.round(d26[i]/1000));nd.push(Math.round(d25[i]/1000));}
  });
  if(!lb.length)return;
  if(window._mC)window._mC.destroy();
  window._mC=new Chart(c.getContext('2d'),{type:'bar',data:{labels:lb,datasets:[
    {label:'Objectif',data:bd,backgroundColor:'rgba(26,32,44,.08)',borderColor:CLR.budget,borderWidth:1,borderRadius:4,order:3},
    {label:'Conso 2026',data:sd,backgroundColor:CLR.c2026,borderRadius:4,order:2},
    {label:'Conso 2025',data:nd,backgroundColor:CLR.c2025+'60',borderColor:CLR.c2025,borderWidth:1,borderRadius:4,order:1}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{usePointStyle:true,boxWidth:10,font:{size:11,weight:'600'}}},tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+' : '+ctx.raw.toLocaleString('fr-FR')+' K MAD';}}}},scales:{y:{beginAtZero:true,ticks:{callback:function(v){return v+' K';},font:{size:10}},grid:{color:'#f0f0f0'}},x:{ticks:{font:{size:10,weight:'600'}},grid:{display:false}}}}});
}

function rTable(lines){
  var h='<div style="max-height:250px;overflow-y:auto;border:1px solid '+CLR.border+';border-radius:10px"><table style="width:100%;border-collapse:collapse;font-size:.8em"><thead style="background:'+CLR.bg+';position:sticky;top:0"><tr>'
    +'<th style="padding:7px 8px;text-align:left;color:'+CLR.slate+';font-weight:600">BC</th>'
    +'<th style="padding:7px 8px;text-align:left;color:'+CLR.slate+';font-weight:600">Site</th>'
    +'<th style="padding:7px 8px;text-align:left;color:'+CLR.slate+';font-weight:600">Fournisseur</th>'
    +'<th style="padding:7px 8px;text-align:left;color:'+CLR.slate+';font-weight:600">Désignation</th>'
    +'<th style="padding:7px 8px;text-align:right;color:'+CLR.slate+';font-weight:600">TTC</th>'
    +'</tr></thead><tbody>';
  lines.forEach(function(l){h+='<tr style="border-bottom:1px solid '+CLR.border+'"><td style="padding:6px 8px;font-weight:700;color:'+CLR.ink+'">'+l.bonCommande+'</td><td style="padding:6px 8px;color:'+CLR.slate+'">'+siteDisp(l.site)+'</td><td style="padding:6px 8px;color:'+CLR.slate+'">'+l.fournisseur+'</td><td style="padding:6px 8px;color:'+CLR.muted+';max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+l.designation+'</td><td style="padding:6px 8px;text-align:right;font-weight:800;color:'+CLR.ink+'">'+fmtN(l.montantTTC)+'</td></tr>';});
  h+='</tbody></table></div>';return h;
}

/* ═══════════ TOP FOURNISSEURS ════════════════════════════════════ */
function setAppTop10Mode(m){
  appTop10Mode=m;
  ['btnTop10','btnTopAll'].forEach(function(id){var b=document.getElementById(id);if(!b)return;var a=(m==='top10'&&id==='btnTop10')||(m==='all'&&id==='btnTopAll');b.style.background=a?'#fff':'transparent';b.style.color=a?CLR.ink:CLR.slate;b.style.boxShadow=a?'0 1px 3px rgba(0,0,0,.1)':'none';});
  renderAppTop10();
}

function renderAppTop10(){
  var fMap={};
  currentAchatFiltered.forEach(function(d){if(d.fournisseur==='Non défini')return;if(!fMap[d.fournisseur])fMap[d.fournisseur]={nom:d.fournisseur,total:0,t25:0,count:0,valide:0,engage:0};fMap[d.fournisseur].total+=d.montantTTC;fMap[d.fournisseur].count++;if(d.isValide)fMap[d.fournisseur].valide+=d.montantTTC;if(d.isEngaged)fMap[d.fournisseur].engage+=d.montantTTC;});
  currentAchat2025Filtered.forEach(function(d){if(!fMap[d.fournisseur])fMap[d.fournisseur]={nom:d.fournisseur,total:0,t25:0,count:0,valide:0,engage:0};fMap[d.fournisseur].t25+=d.consommation;});

  var h='';achSet('topFournCount',all.length+' fournisseur(s)');
  top.forEach(function(f,i){
    var p=(f.total/maxF*100),col=colors[i%colors.length];
    var ev=f.t25>0?((f.total-f.t25)/f.t25*100):null;
    var evT=ev==null?'':(ev>0?'+':'-')+Math.abs(ev).toFixed(0)+'%';
    var evC=ev==null?CLR.muted:(ev>0?CLR.rose:CLR.emerald);
    h+='<div onclick="openFournisseurModal('+i+')" style="display:flex;align-items:center;gap:12px;padding:10px 4px;border-bottom:1px solid #f7fafc;cursor:pointer;border-radius:6px;transition:all .15s" onmouseover="this.style.background=\'#f7fafc\';this.style.transform=\'translateX(3px)\'" onmouseout="this.style.background=\'transparent\';this.style.transform=\'translateX(0)\'">'
      +'<div style="background:'+col+';color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.78em;flex-shrink:0">'+(i+1)+'</div>'
      +'<div style="flex:1;min-width:0"><div style="font-weight:700;color:'+CLR.ink+';font-size:.84em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+f.nom+'</div>'
      +'<div style="height:5px;background:#edf2f7;border-radius:3px;margin:5px 0"><div style="height:100%;width:'+p+'%;background:'+col+';border-radius:3px"></div></div>'
      +'<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:800;color:'+CLR.c2026+';font-size:.82em">'+fmtK(f.total)+'</span>'+(evT?'<span style="color:'+evC+';font-weight:800;font-size:.75em;margin-left:8px">'+evT+'</span>':'')+'<span style="color:'+CLR.muted+';font-size:.72em;margin-left:auto">'+f.count+' lignes</span></div></div></div>';
  });
  if(!top.length)h='<div style="padding:20px;text-align:center;color:'+CLR.muted+'">Aucun fournisseur</div>';
  achHTML('appTop10Leaderboard',h);

function rFChart(d26,d25){

  if(window._fC)window._fC.destroy();
  window._fC=new Chart(c.getContext('2d'),{type:'bar',data:{labels:MONTHS,datasets:[
    {label:'Conso 2026',data:d26.map(function(v){return Math.round(v/1000);}),backgroundColor:CLR.c2026,borderRadius:6,barPercentage:.45,categoryPercentage:.7},
    {label:'Conso 2025',data:d25.map(function(v){return Math.round(v/1000);}),backgroundColor:CLR.c2025+'80',borderColor:CLR.c2025,borderWidth:1,borderRadius:6,barPercentage:.45,categoryPercentage:.7}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{usePointStyle:true,boxWidth:10,font:{size:11,weight:'600'}}},tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+' : '+ctx.raw.toLocaleString('fr-FR')+' K MAD';}}}},scales:{y:{display:false},x:{ticks:{font:{size:11,weight:'700'}},grid:{display:false}}}},

function exportModalExcel(){if(!currentModalRows||!currentModalRows.length){alert('Aucune donnée.');return;}if(typeof XLSX==='undefined'){alert('XLSX non chargé.');return;}var data=currentModalRows.map(function(l){return{'Site':siteDisp(l.site),'BC':l.bonCommande,'Fournisseur':l.fournisseur,'Désignation':l.designation,'Famille':l.famille,'Section':l.section,'Montant TTC':l.montantTTC};});var ws=XLSX.utils.json_to_sheet(data);var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Détail');XLSX.writeFile(wb,'detail_'+currentModalTitle+'.xlsx');}
function exportModalPDF(){if(typeof html2canvas==='undefined'){alert('html2canvas non chargé.');return;}var content=document.getElementById('modalContent');if(!content)return;html2canvas(content,{scale:2}).then(function(canvas){var J=(typeof jspdf!=='undefined')?jspdf.jsPDF:jsPDF;var pdf=new J('l','mm','a4');var img=canvas.toDataURL('image/png');var w=pdf.internal.pageSize.getWidth()-20;var h=canvas.height*w/canvas.width;pdf.addImage(img,'PNG',10,10,w,h);pdf.save('detail_'+currentModalTitle+'.pdf');});}
