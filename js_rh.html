<script>
var rhCharts = {};
var RH_STATE = {
  entite: "ALL", sousEntite: "",
  annee: "",
  trimestresSel: [],
  moisSel: [],
  allMonthsRaw: [],
  masseSerie: null,
  congesSerie: null,
  globalCacheByMonth: {},
  activeTab: "global",
  msOpen: null
};

// ===================== HELPERS =====================
function setTxt_(id, v) { var el = document.getElementById(id); if (el) el.textContent = (v === null || v === undefined || v === "") ? "--" : String(v); }
function fmtNum_(x) { var n = Number(x); if (isNaN(n)) return "--"; return n.toLocaleString("fr-FR"); }
function fmtPct_(x) { var n = Number(x); if (isNaN(n)) return "--"; return (n * 100).toFixed(1).replace(".", ",") + "%"; }
function fmtCompact_(x) {
  var n = Number(x); if (isNaN(n) || n === 0) return "0";
  var abs = Math.abs(n);
  if (abs >= 1000000) return (n/1000000).toFixed(1).replace(".",",") + "M";
  if (abs >= 1000) return (n/1000).toFixed(0) + "k";
  return Math.round(n).toString();
}
function fillSel_(id, arr) {
  var el = document.getElementById(id); if (!el) return;
  el.innerHTML = "";
  (arr || []).forEach(function(item) {
    var isObj = item && typeof item === "object";
    var value = isObj ? String(item.value == null ? "" : item.value) : String(item == null ? "" : item);
    var label = isObj ? String(item.label == null ? value : item.label) : ((value === "ALL") ? "TOUT" : value);
    var opt = document.createElement("option"); opt.value = value; opt.textContent = label; el.appendChild(opt);
  });
}
function monthLabelShort_(ym) {
  var s = String(ym || ""), m = 0;
  if (s.indexOf("-") >= 0) m = Number(s.split("-")[1] || 0);
  var map = ["", "Jan", "Fév", "Mar", "Avr", "Mai", "Juin", "Juil", "Août", "Sept", "Oct", "Nov", "Déc"];
  return map[m] || s;
}
function monthLabelFR_(ym) {
  var s = String(ym || ""), parts = s.split("-"), y = parts[0] || "", m = parts[1] || "";
  var map = { "01": "Jan", "02": "Fév", "03": "Mar", "04": "Avr", "05": "Mai", "06": "Juin", "07": "Juil", "08": "Août", "09": "Sept", "10": "Oct", "11": "Nov", "12": "Déc" };
  return (map[m] || m) + " " + y;
}
function quarterOf_(ym) { var m = Number(String(ym || "").split("-")[1] || 0); if (!m) return 0; if (m <= 3) return 1; if (m <= 6) return 2; if (m <= 9) return 3; return 4; }
function destroyChart_(id) { if (rhCharts[id]) { rhCharts[id].destroy(); delete rhCharts[id]; } }
function ensureDataLabels_() { if (window.Chart && window.ChartDataLabels && !window.__RH_DATALABELS_REGISTERED__) { Chart.register(ChartDataLabels); window.__RH_DATALABELS_REGISTERED__ = true; } }
function commonTooltip_() { return { enabled: true, backgroundColor: "rgba(16,24,40,0.95)", titleColor: "#fff", bodyColor: "#fff", padding: 12, cornerRadius: 12, displayColors: true, titleFont: { weight: "900", size: 13 }, bodyFont: { weight: "600", size: 12 } }; }
function showHoverTip_(html, x, y) {
  var tip = document.getElementById("rhHoverTip"); if (!tip) return;
  tip.innerHTML = html; tip.style.display = "block";
  var pad = 14, ww = window.innerWidth, wh = window.innerHeight;
  var left = x + pad, top = y + pad;
  var rect = tip.getBoundingClientRect();
  if (left + rect.width > ww - 10) left = x - rect.width - pad;
  if (top + rect.height > wh - 10) top = y - rect.height - pad;
  tip.style.left = left + "px"; tip.style.top = top + "px";
}
function hideHoverTip_() { var tip = document.getElementById("rhHoverTip"); if (tip) tip.style.display = "none"; }

// ===================== MULTI-SELECT =====================
window.rhToggleMs = function(id, ev) {
  if (ev) ev.stopPropagation();
  var wrap = document.getElementById(id); if (!wrap) return;
  var trigger = wrap.querySelector(".ms-trigger");
  var dropdown = wrap.querySelector(".ms-dropdown");
  var isOpen = dropdown.classList.contains("open");
  document.querySelectorAll(".ms-dropdown.open").forEach(function(d){ d.classList.remove("open"); });
  document.querySelectorAll(".ms-trigger.open").forEach(function(d){ d.classList.remove("open"); });
  if (!isOpen) { dropdown.classList.add("open"); trigger.classList.add("open"); RH_STATE.msOpen = id; }
  else { RH_STATE.msOpen = null; }
};
document.addEventListener("click", function(e){
  if (e.target.closest(".ms-wrap")) return;
  document.querySelectorAll(".ms-dropdown.open").forEach(function(d){ d.classList.remove("open"); });
  document.querySelectorAll(".ms-trigger.open").forEach(function(d){ d.classList.remove("open"); });
  RH_STATE.msOpen = null;
});

window.rhMsAll = function(kind, ev) {
  if (ev) ev.stopPropagation();
  if (kind === "tri") { RH_STATE.trimestresSel = ["T1","T2","T3","T4"]; renderTriOptions_(); }
  else if (kind === "mois") { RH_STATE.moisSel = filteredMonths_().slice(); renderMoisOptions_(); }
  applyAllFilters_();
};
window.rhMsNone = function(kind, ev) {
  if (ev) ev.stopPropagation();
  if (kind === "tri") { RH_STATE.trimestresSel = []; renderTriOptions_(); }
  else if (kind === "mois") { RH_STATE.moisSel = []; renderMoisOptions_(); }
  applyAllFilters_();
};

function filteredMonths_() {
  var y = RH_STATE.annee;
  return (RH_STATE.allMonthsRaw || []).filter(function(m){ return !y || String(m).indexOf(y + "-") === 0; });
}

function renderTriOptions_() {
  var box = document.getElementById("rhTriOptions"); if (!box) return;
  box.innerHTML = "";
  var items = ["T1","T2","T3","T4"];
  items.forEach(function(t){
    var sel = RH_STATE.trimestresSel.indexOf(t) >= 0;
    var div = document.createElement("div");
    div.className = "ms-option" + (sel ? " selected" : "");
    div.innerHTML = '<div class="ms-checkbox"></div><span>' + t + '</span>';
    div.onclick = function(e){ e.stopPropagation();
      if (sel) RH_STATE.trimestresSel = RH_STATE.trimestresSel.filter(function(x){ return x !== t; });
      else RH_STATE.trimestresSel.push(t);
      renderTriOptions_(); renderMoisOptions_(); applyAllFilters_();
    };
    box.appendChild(div);
  });
  updateTriValue_();
}
function updateTriValue_() {
  var el = document.getElementById("rhTriValue"); if (!el) return;
  var sel = RH_STATE.trimestresSel;
  if (!sel.length || sel.length === 4) el.textContent = "TOUT";
  else if (sel.length <= 2) el.textContent = sel.slice().sort().join(", ");
  else el.textContent = sel.length + " sélectionnés";
}

function renderMoisOptions_() {
  var box = document.getElementById("rhMoisOptions"); if (!box) return;
  box.innerHTML = "";
  var months = filteredMonths_();
  if (RH_STATE.trimestresSel.length > 0 && RH_STATE.trimestresSel.length < 4) {
    months = months.filter(function(m){ return RH_STATE.trimestresSel.indexOf("T" + quarterOf_(m)) >= 0; });
  }
  months.forEach(function(m){
    var sel = RH_STATE.moisSel.indexOf(m) >= 0;
    var div = document.createElement("div");
    div.className = "ms-option" + (sel ? " selected" : "");
    div.innerHTML = '<div class="ms-checkbox"></div><span>' + monthLabelFR_(m) + '</span>';
    div.onclick = function(e){ e.stopPropagation();
      if (sel) RH_STATE.moisSel = RH_STATE.moisSel.filter(function(x){ return x !== m; });
      else RH_STATE.moisSel.push(m);
      renderMoisOptions_(); applyAllFilters_();
    };
    box.appendChild(div);
  });
  updateMoisValue_();
}
function updateMoisValue_() {
  var el = document.getElementById("rhMoisValue"); if (!el) return;
  var sel = RH_STATE.moisSel;
  var avail = filteredMonths_();
  if (RH_STATE.trimestresSel.length > 0 && RH_STATE.trimestresSel.length < 4) {
    avail = avail.filter(function(m){ return RH_STATE.trimestresSel.indexOf("T" + quarterOf_(m)) >= 0; });
  }
  if (!sel.length || sel.length === avail.length) el.textContent = "TOUT";
  else if (sel.length <= 2) el.textContent = sel.map(monthLabelShort_).join(", ");
  else el.textContent = sel.length + " mois";
}

function activeMonths_() {
  var avail = filteredMonths_();
  if (RH_STATE.trimestresSel.length > 0 && RH_STATE.trimestresSel.length < 4) {
    avail = avail.filter(function(m){ return RH_STATE.trimestresSel.indexOf("T" + quarterOf_(m)) >= 0; });
  }
  if (RH_STATE.moisSel.length > 0) {
    avail = avail.filter(function(m){ return RH_STATE.moisSel.indexOf(m) >= 0; });
  }
  return avail;
}

// Dernier mois disponible avec données (pour défaut Congés)
function lastSaisiMonth_(serie) {
  if (!serie || !serie.length) return "";
  var s = serie.slice().sort(function(a,b){ return String(a.mois).localeCompare(String(b.mois)); });
  for (var i = s.length - 1; i >= 0; i--) {
    if (Number(s[i].nbPersonnel||0) > 0 || Number(s[i].totalJours||0) > 0 || Number(s[i].provisionTotale||0) > 0) {
      return s[i].mois;
    }
  }
  return s[s.length-1].mois;
}

// ===================== INIT =====================
function enterRhMode_() { initRhData_(); }

function initRhData_() {
  var entEl = document.getElementById("rhEntite");
  var anneeEl = document.getElementById("rhAnnee");

  var initEntite = "ALL";
  if (window.currentUserContext && window.currentUserContext.role === "VIEWER_ENTITY") initEntite = window.currentUserContext.entity;

  google.script.run
    .withSuccessHandler(function(res) {
      var entites = (res.filters && res.filters.entites) ? res.filters.entites.slice() : ["ALL"];
      var base = entites.filter(function(x) { return String(x).toUpperCase().trim() !== "ALL"; }).sort();
      var options = [{ value: "ALL", label: "TOUT" }];
      base.forEach(function(e) { options.push({ value: e, label: e }); });
      if (entEl) fillSel_("rhEntite", options);

      var allMonths = (res.filters && res.filters.mois) ? res.filters.mois.slice() : [];
      allMonths.sort();
      RH_STATE.allMonthsRaw = allMonths;
      var years = Array.from(new Set(allMonths.map(function(m) { return String(m).split("-")[0]; }))).sort();
      if (anneeEl) {
        fillSel_("rhAnnee", years.map(function(y){ return {value:y, label:y}; }));
        var defYear = (res.filters && res.filters.defaultAnnee) ? res.filters.defaultAnnee : (years.length ? years[years.length-1] : "");
        anneeEl.value = defYear;
        RH_STATE.annee = defYear;
      }

      RH_STATE.entite = initEntite;
      RH_STATE.trimestresSel = [];
      RH_STATE.moisSel = [];

      if (entEl) entEl.onchange = function(){ RH_STATE.entite = entEl.value || "ALL"; refreshAll_(); };
      if (anneeEl) anneeEl.onchange = function(){
        RH_STATE.annee = anneeEl.value || "";
        RH_STATE.trimestresSel = [];
        RH_STATE.moisSel = [];
        renderTriOptions_(); renderMoisOptions_();
        refreshAll_();
      };

      renderTriOptions_(); renderMoisOptions_();

      var c = document.getElementById("rhModalClose"); if (c) c.onclick = closeRhModal_;
      var msk = document.getElementById("rhModalMask"); if (msk) msk.onclick = closeRhModal_;

      refreshAll_();
    })
    .withFailureHandler(function(err) { console.error("apiRH init error:", err); })
    .apiRH({ entite: initEntite, annee: "", mois: "" });
}

function refreshAll_() {
  loadGlobalForCurrentMonth_();
  loadMasseSerie_();
  loadCongesSerie_();
}

function refMonth_() {
  var active = activeMonths_();
  if (active.length > 0) return active[active.length - 1];
  var avail = filteredMonths_();
  return avail.length ? avail[avail.length - 1] : "";
}

function loadGlobalForCurrentMonth_() {
  var ent = RH_STATE.entite || "ALL";
  var mois = refMonth_();
  var annee = RH_STATE.annee || "";
  var key = ent + "|" + annee + "|" + mois;
  if (RH_STATE.globalCacheByMonth[key]) {
    renderRH_(RH_STATE.globalCacheByMonth[key]);
    return;
  }
  google.script.run
    .withSuccessHandler(function(res){
      RH_STATE.globalCacheByMonth[key] = res;
      renderRH_(res);
    })
    .withFailureHandler(function(err){ console.error("apiRH error:", err); })
    .apiRH({ entite: ent, annee: annee, mois: mois });
}

function loadMasseSerie_() {
  showMasseSkeleton_();
  google.script.run
    .withSuccessHandler(function(res) {
      RH_STATE.masseSerie = res;
      applyMasseFilter_();
    })
    .withFailureHandler(function(err) { console.error("apiRHMasse error:", err); hideMasseSkeleton_(); })
    .apiRHMasse({ entite: RH_STATE.entite || "ALL", annee: RH_STATE.annee || "", mois: "" });
}

function loadCongesSerie_() {
  showCongesSkeleton_();
  google.script.run
    .withSuccessHandler(function(res){
      RH_STATE.congesSerie = res;
      applyCongesFilter_();
    })
    .withFailureHandler(function(err){ console.error("apiRHConges error:", err); hideCongesSkeleton_(); })
    .apiRHConges({ entite: RH_STATE.entite || "ALL", mois: "" });
}

function applyAllFilters_() {
  updateTriValue_(); updateMoisValue_();
  loadGlobalForCurrentMonth_();
  applyMasseFilter_();
  applyCongesFilter_();
  updateBanner_();
}

function updateBanner_() {
  var titleEl = document.getElementById("rhBannerTitle");
  var subEl = document.getElementById("rhBannerSub");
  var badgeEl = document.getElementById("rhBannerBadge");
  var tab = RH_STATE.activeTab;
  if (tab === "global") { titleEl.textContent = "Tableau de bord RH"; subEl.textContent = "Vue d'ensemble — Région Centre"; }
  else if (tab === "masse") { titleEl.textContent = "Masse Salariale vs Budget"; subEl.textContent = "Suivi mensuel et cumulé — Région Centre"; }
  else { titleEl.textContent = "Provision Congés Payés"; subEl.textContent = "Suivi mensuel et cumulé — Région Centre"; }
  var active = activeMonths_();
  var avail = filteredMonths_();
  if (RH_STATE.trimestresSel.length > 0 && RH_STATE.trimestresSel.length < 4) {
    avail = avail.filter(function(m){ return RH_STATE.trimestresSel.indexOf("T" + quarterOf_(m)) >= 0; });
  }
  var label;
  if (active.length === 0 || active.length === avail.length) label = "Cumul " + (RH_STATE.annee || "année");
  else if (active.length === 1) label = monthLabelFR_(active[0]);
  else label = active.length + " mois — " + (RH_STATE.annee || "");
  badgeEl.textContent = label;
}

// ===================== VUE GLOBALE =====================
function renderRH_(res) {
  if (!res) return;
  var k = res.kpis || {};
  var c = res.charts || {};
  var kpisExtra = res.kpisExtra || {};
  if (!k || k.available === false) {
    setTxt_("kpi-nbpers", "--"); setTxt_("kpi-nbpers-sub", "--");
    setTxt_("kpi-recrut", "--"); setTxt_("kpi-depart", "--");
    setTxt_("kpi-tauxabs", "--"); setTxt_("kpi-turnover2", "--");
    setTxt_("kpi-at", "--"); setTxt_("kpi-aes", "--");
    drawCategorie_({}); drawAgeCards_({}); drawContratCards_({});
    return;
  }
  setTxt_("kpi-nbpers", fmtNum_(k.personnel));
  setTxt_("kpi-nbpers-sub", "début: " + fmtNum_(k.effectifDebut) + " | fin: " + fmtNum_(k.effectifFin));
  setTxt_("kpi-recrut", fmtNum_(k.nbRecrutements));
  setTxt_("kpi-depart", fmtNum_(k.nbDeparts));
  drawCategorie_((c && c.categorie) || {});
  drawFlux_((c && c.flux) || {});
  drawGenre_((c && c.genre) || {});
  drawAgeCards_((c && c.age) || {});
  drawContratCards_((c && c.contrat) || {});
  setTxt_("kpi-tauxabs", fmtPct_(kpisExtra.tauxAbsenteisme));
  setTxt_("kpi-turnover2", fmtPct_(kpisExtra.turnover));
  setTxt_("kpi-at", fmtNum_(kpisExtra.at));
  setTxt_("kpi-aes", fmtNum_(kpisExtra.aes));
}

function drawContratCards_(contratObj) {
  var grid = document.getElementById("rhContratGrid"); if (!grid) return;
  var items = [{ key: "CDI", label: "CDI" }, { key: "CDD", label: "CDD" }, { key: "STAGE", label: "Stage" }, { key: "ND", label: "Non défini" }];
  var values = items.map(function(it) { return Number(contratObj[it.key] || 0); });
  var total = values.reduce(function(a, b) { return a + b; }, 0);
  grid.innerHTML = "";
  items.forEach(function(it, idx) {
    var v = values[idx]; var pct = total > 0 ? Math.round((v / total) * 100) : 0;
    var card = document.createElement("div"); card.className = "age-card";
    card.innerHTML = '<div class="age-top"><div class="age-val">' + fmtNum_(v) + '</div><div class="age-pct">' + pct + '%</div></div><div class="age-label">' + it.label + '</div><div class="age-bar"><div class="age-fill" style="width:' + pct + '%"></div></div>';
    grid.appendChild(card);
  });
}

function drawCategorie_(catObj) {
  var box = document.getElementById("rhCatList"); if (!box) return;
  var labels = ["Paramédical", "Direction", "Hébergement", "Stagiaires"];
  var values = labels.map(function(l) { return Number(catObj[l] || 0); });
  var total = values.reduce(function(a, b) { return a + b; }, 0);
  var colors = { "Paramédical": "#0EA5E9", "Direction": "#10B981", "Hébergement": "#3B82F6", "Stagiaires": "#8B5CF6" };
  box.innerHTML = "";
  labels.forEach(function(label, i) {
    var v = values[i]; var pct = total > 0 ? Math.round((v / total) * 100) : 0;
    var row = document.createElement("div"); row.className = "cat-row";
    row.innerHTML = '<div class="cat-label">' + label + '</div><div class="cat-bar"><div class="cat-fill" style="background:' + (colors[label] || "#0EA5E9") + ';width:' + pct + '%"></div></div><div class="cat-pct">' + pct + '%</div>';
    row.onclick = function() { openRhHistory_("categorie", label, "Historique — " + label); };
    box.appendChild(row);
  });
}

function drawAgeCards_(ageObj) {
  var grid = document.getElementById("rhAgeGrid"); if (!grid) return;
  var items = [{ key: "20-30", label: "de 20 à 30 ans" }, { key: "30-45", label: "de 30 à 45 ans" }, { key: "45-55", label: "de 45 à 55 ans" }, { key: ">55", label: "> 55 ans" }];
  var values = items.map(function(it) { return Number(ageObj[it.key] || 0); });
  var total = values.reduce(function(a, b) { return a + b; }, 0);
  grid.innerHTML = "";
  items.forEach(function(it, idx) {
    var v = values[idx]; var pct = total > 0 ? Math.round((v / total) * 100) : 0;
    var card = document.createElement("div"); card.className = "age-card";
    card.innerHTML = '<div class="age-top"><div class="age-val">' + fmtNum_(v) + '</div><div class="age-pct">' + pct + '%</div></div><div class="age-label">' + it.label + '</div><div class="age-bar"><div class="age-fill" style="width:' + pct + '%"></div></div>';
    card.onclick = function() { openRhHistory_("age", it.key, "Historique — Tranche " + it.key); };
    grid.appendChild(card);
  });
}

function drawDonut_(canvasId, labels, values, colors, centerTop, centerBottom, centerColor, onClickLabel) {
  ensureDataLabels_();
  var elc = document.getElementById(canvasId); if (!elc) return;
  var ctx = elc.getContext("2d");
  destroyChart_(canvasId);
  rhCharts[canvasId] = new Chart(ctx, {
    type: "doughnut",
    data: { labels: labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 0 }] },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: "70%",
      plugins: { legend: { display: true, position: "bottom", labels: { usePointStyle: true, boxWidth: 8, font: { weight: "900" } } }, tooltip: commonTooltip_(), datalabels: { display: false } },
      onClick: function(_, els) { if (!els || !els.length) return; var i = els[0].index; if (onClickLabel) onClickLabel(labels[i]); }
    },
    plugins: [{
      id: canvasId + "_center",
      afterDraw: function(chart) {
        var ca = chart.chartArea; var x = (ca.left + ca.right) / 2; var y = (ca.top + ca.bottom) / 2;
        chart.ctx.save(); chart.ctx.textAlign = "center"; chart.ctx.fillStyle = centerColor || "#6366F1";
        chart.ctx.font = "900 14px Segoe UI"; chart.ctx.fillText(centerTop || "", x, y - 8);
        chart.ctx.font = "bold 20px Segoe UI"; chart.ctx.fillText(centerBottom || "", x, y + 16); chart.ctx.restore();
      }
    }]
  });
}
function drawFlux_(flux) {
  var fin = Number(flux.in || 0); var fout = Number(flux.out || 0); var solde = fin - fout;
  var soldeColor = solde >= 0 ? "#10B981" : "#EF4444";
  drawDonut_("chartRhFlux", ["Entrants", "Sortants"], [fin, fout], ["#10B981", "#EF4444"], "Solde", (solde > 0 ? "+" : "") + solde, soldeColor, function(l) { openRhHistory_("flux", l, "Historique — " + l); });
}
function drawGenre_(g) {
  var femmes = Number(g.femmes || 0); var hommes = Number(g.hommes || 0); var tot = femmes + hommes;
  var pctFemme = tot > 0 ? Math.round((femmes / tot) * 100) + "%" : "0%";
  drawDonut_("chartRhGenre", ["Femmes", "Hommes"], [femmes, hommes], ["#EC4899", "#3B82F6"], pctFemme, "FEMMES", "#EC4899", function(l) { openRhHistory_("genre", l, "Historique — " + l); });
}

// ===================== MASSE SALARIALE =====================
function showMasseSkeleton_() {
  ["kpi-ms-budget","kpi-ms-real","kpi-ms-taux","kpi-var-total"].forEach(function(id){ var el = document.getElementById(id); if (el) el.innerHTML = '<span class="skel-block"></span>'; });
}
function hideMasseSkeleton_() {
  ["kpi-ms-budget","kpi-ms-real","kpi-ms-taux","kpi-var-total"].forEach(function(id){ var el = document.getElementById(id); if (el) el.textContent = "--"; });
}

// === CORRECTION VARIABLES: agrégation robuste qui scanne plusieurs structures backend ===
function getVarsForMonth_(res, mois) {
  // 1. Tenter dans res.series.varsPerMonth (notre format)
  if (res.series && res.series.varsPerMonth && res.series.varsPerMonth[mois]) {
    return res.series.varsPerMonth[mois];
  }
  // 2. Tenter dans res.variables (différents formats possibles)
  if (res.variables) {
    if (res.variables.perMonth && res.variables.perMonth[mois]) return res.variables.perMonth[mois];
    if (res.variables.series && Array.isArray(res.variables.series)) {
      var found = res.variables.series.filter(function(v){ return v.mois === mois; })[0];
      if (found) return found;
    }
    if (res.variables.selected && res.variables.selected.mois === mois) return res.variables.selected;
  }
  // 3. Tenter dans res.varsByMonth direct
  if (res.varsByMonth && res.varsByMonth[mois]) return res.varsByMonth[mois];
  // 4. Si selected.vars correspond au mois demandé
  if (res.selected && res.selected.vars && res.selected.vars.mois === mois) return res.selected.vars;
  return null;
}

function aggregateVars_(res, activeMonthsList) {
  if (!res) return null;
  // Si pas de mois actif => on prend toute la série de l'année
  var monthsToAgg = (activeMonthsList && activeMonthsList.length > 0) ? activeMonthsList : filteredMonths_();

  var agg = { actes:0, garde:0, df:0, autres:0, total:0, count:0 };
  monthsToAgg.forEach(function(m){
    var v = getVarsForMonth_(res, m);
    if (v) {
      agg.actes += Number(v.actes || 0);
      agg.garde += Number(v.garde || 0);
      agg.df += Number(v.df || 0);
      agg.autres += Number(v.autres || 0);
      agg.total += Number(v.total || 0);
      agg.count++;
    }
  });

  // Si rien trouvé via per-month, fallback: utiliser res.selected.vars (au moins un mois)
  if (agg.count === 0 && res.selected && res.selected.vars) {
    var sv = res.selected.vars;
    return { actes: Number(sv.actes||0), garde: Number(sv.garde||0), df: Number(sv.df||0), autres: Number(sv.autres||0), total: Number(sv.total||0), fallback: true };
  }
  if (agg.count === 0) return null;
  // Si total non rempli, recalculer
  if (agg.total === 0 && (agg.actes + agg.garde + agg.df + agg.autres) > 0) {
    agg.total = agg.actes + agg.garde + agg.df + agg.autres;
  }
  return agg;
}

function applyMasseFilter_() {
  var res = RH_STATE.masseSerie;
  if (!res) return;

  var active = activeMonths_();
  var isFullYear = active.length === 0 || active.length === filteredMonths_().length;

  // Série filtrée
  var serie = [];
  if (res.series && Array.isArray(res.series.months)) {
    var months = res.series.months || [], budget = res.series.budget || [], real = res.series.real || [];
    for (var i = 0; i < months.length; i++) {
      var m = months[i];
      if (RH_STATE.annee && String(m).indexOf(RH_STATE.annee + "-") !== 0) continue;
      if (active.length > 0 && active.indexOf(m) < 0) continue;
      serie.push({ mois: m, budget: Number(budget[i] || 0), realise: Number(real[i] || 0), taux: budget[i] > 0 ? (real[i] / budget[i]) * 100 : 0 });
    }
  }

  var totalBudget = 0, totalReal = 0;
  serie.forEach(function(x){ totalBudget += x.budget; totalReal += x.realise; });
  var tauxCumul = totalBudget > 0 ? (totalReal / totalBudget) * 100 : 0;

  var chipTxt;
  if (active.length === 1) chipTxt = monthLabelShort_(active[0]);
  else if (isFullYear) chipTxt = (RH_STATE.annee || "Année");
  else chipTxt = active.length + " mois";

  setTxt_("kpi-ms-budget", fmtNum_(Math.round(totalBudget)));
  setTxt_("kpi-ms-real", fmtNum_(Math.round(totalReal)));
  setTxt_("kpi-ms-taux", Math.round(tauxCumul) + "%");
  setTxt_("kpi-ms-budget-chip", chipTxt);
  setTxt_("kpi-ms-real-chip", chipTxt);
  setTxt_("kpi-ms-taux-chip", chipTxt);

  // Variables : passe l'ensemble des mois actifs (ou toute l'année si pas de filtre)
  var monthsForVars = active.length > 0 ? active : serie.map(function(x){ return x.mois; });
  var varsTotal = aggregateVars_(res, monthsForVars);

  if (varsTotal && varsTotal.total > 0) {
    setTxt_("kpi-var-total", fmtNum_(varsTotal.total));
    setTxt_("kpi-var-total-chip", chipTxt);
    renderDetailVars_(varsTotal, chipTxt);
  } else if (varsTotal) {
    // Variables détectées mais total = 0
    setTxt_("kpi-var-total", "0");
    setTxt_("kpi-var-total-chip", chipTxt);
    renderDetailVars_(varsTotal, chipTxt);
  } else {
    setTxt_("kpi-var-total", "—");
    setTxt_("kpi-var-total-chip", "N/A");
    clearDetailVars_();
  }

  drawMasseVsBudget_(serie);
}

function applyCongesFilter_() {
  hideCongesSkeleton_();
  var res = RH_STATE.congesSerie;
  if (!res) return;

  var active = activeMonths_();
  var isFullYear = active.length === 0 || active.length === filteredMonths_().length;

  // Série pour le graphique (filtrée par période)
  var serieGraph = (res.series || []).filter(function(x){
    if (RH_STATE.annee && String(x.mois).indexOf(RH_STATE.annee + "-") !== 0) return false;
    if (active.length > 0 && active.indexOf(x.mois) < 0) return false;
    return true;
  });

  // ===== CARTES KPI =====
  // RÈGLE : pas de cumul. On affiche les valeurs du mois de référence
  // - Si 1 mois sélectionné => ce mois
  // - Si plusieurs mois ou TOUT => dernier mois saisi (avec données)
  var refMois;
  if (active.length === 1) {
    refMois = active[0];
  } else {
    // Chercher le dernier mois saisi parmi les mois actifs (ou parmi tous si actif est vide)
    var pool = active.length > 0 ? serieGraph : (res.series || []).filter(function(x){
      return !RH_STATE.annee || String(x.mois).indexOf(RH_STATE.annee + "-") === 0;
    });
    refMois = lastSaisiMonth_(pool);
  }

  // Récupérer la ligne du mois de référence (totaux déjà calculés par le backend)
  var refRow = (res.series || []).filter(function(x){ return x.mois === refMois; })[0] || { nbPersonnel: 0, totalJours: 0, provisionTotale: 0 };

  var nbPers = Number(refRow.nbPersonnel || 0);
  var totalJours = Number(refRow.totalJours || 0);
  var totalProv = Number(refRow.provisionTotale || 0);

  // Chip = mois de référence affiché
  var chipTxt = refMois ? monthLabelFR_(refMois) : "—";

  var fmtFull = function(v){ return Math.round(Number(v||0)).toLocaleString("fr-FR"); };
  setTxt_("kpi-conges-personnel", fmtNum_(nbPers));
  setTxt_("kpi-conges-jours", fmtNum_(totalJours));
  setTxt_("kpi-conges-provision", fmtFull(totalProv) + " MAD");
  setTxt_("kpi-conges-mois-chip", chipTxt);
  setTxt_("kpi-conges-jours-chip", chipTxt);
  setTxt_("kpi-conges-provision-chip", chipTxt);

  drawCongesChartModern_(serieGraph);
  renderCongesTable_(res, active);
}

function renderCongesTable_(res, activeMonths) {
  var head = document.getElementById("tableCongesHead");
  var tbody = document.querySelector("#tableCongesDetail tbody");
  var title = document.getElementById("congesTableTitle");
  if (!head || !tbody) return;
  tbody.innerHTML = ""; head.innerHTML = "";
  var fmtFull = function(v){ return Math.round(Number(v||0)).toLocaleString("fr-FR"); };

  if (RH_STATE.entite && RH_STATE.entite !== "ALL") {
    if (title) title.textContent = "Détail par mois — " + RH_STATE.entite;
    head.innerHTML = "<th>Mois</th><th>Nb personnel</th><th>Total jours</th><th>Provision totale (MAD)</th>";
    var rows = (res.series || []).filter(function(x){
      if (RH_STATE.annee && String(x.mois).indexOf(RH_STATE.annee + "-") !== 0) return false;
      if (activeMonths.length > 0 && activeMonths.indexOf(x.mois) < 0) return false;
      return true;
    });
    if (!rows.length) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#94A3B8;padding:16px">Aucune donnée</td></tr>'; return; }
    rows.forEach(function(r){
      var tr = document.createElement("tr");
      tr.innerHTML = "<td>" + monthLabelFR_(r.mois) + "</td><td>" + fmtNum_(r.nbPersonnel) + "</td><td>" + fmtNum_(r.totalJours) + "</td><td>" + fmtFull(r.provisionTotale) + " MAD</td>";
      tbody.appendChild(tr);
    });
  } else {
    if (title) title.textContent = "Détail par entité";
    head.innerHTML = "<th>Entité</th><th>Nb personnel</th><th>Total jours</th><th>Provision totale (MAD)</th>";
    var byEnt = res.detailParEntite || [];
    if (!byEnt.length) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#94A3B8;padding:16px">Aucune donnée</td></tr>'; return; }
    byEnt.forEach(function(r){
      var tr = document.createElement("tr");
      tr.innerHTML = "<td>" + r.entite + "</td><td>" + fmtNum_(r.nbPersonnel) + "</td><td>" + fmtNum_(r.totalJours) + "</td><td>" + fmtFull(r.provisionTotale) + " MAD</td>";
      tbody.appendChild(tr);
    });
  }
}

// ===================== MODAL HISTORY VUE GLOBALE =====================
function openRhHistory_(kind, key, title) {
  var mask = document.getElementById("rhModalMask"); var ttl = document.getElementById("rhModalTitle");
  if (ttl) ttl.textContent = title ? String(title) : ("Historique : " + key);
  if (mask) mask.style.display = "flex";
  var ent = RH_STATE.entite || "ALL";
  ensureDataLabels_();
  var body = document.getElementById("rhModalBody");
  if (body) body.innerHTML = '<canvas id="rhHistChart"></canvas>';
  google.script.run
    .withFailureHandler(function(err){ console.error("apiRHHistory error:", err); })
    .withSuccessHandler(function(res){
      var cv = document.getElementById("rhHistChart"); if (!cv) return;
      var ctx = cv.getContext("2d"); if (window.rhHistoryChart) window.rhHistoryChart.destroy();
      var months = res.months || []; var data = (res.points || []).map(function(p){ return Number(p.value) || 0; });
      window.rhHistoryChart = new Chart(ctx, {
        type: "line",
        data: { labels: months, datasets: [{ label: res.label || key, data: data, borderColor: "#6366F1", backgroundColor: "rgba(99,102,241,0.10)", fill: true, tension: 0.35, pointRadius: 4, pointHoverRadius: 6 }] },
        options: {
          responsive: true, maintainAspectRatio: false, layout: { padding: { top: 25 } },
          plugins: { legend: { display: false }, datalabels: { display: true, align: "top", anchor: "end", offset: 4, color: "#6366F1", font: { size: 12, weight: "900" }, formatter: function(v){ return fmtNum_(v); } }, tooltip: commonTooltip_() },
          scales: { x: { grid: { display: false }, ticks: { font: { size: 12, weight: "800" }, color: "#475467" } }, y: { display: false, beginAtZero: true, grace: "15%" } }
        }
      });
    })
    .apiRHHistory({ entite: ent, annee: (RH_STATE.annee || ""), kind: kind, key: key });
}

function closeRhModal_() { var mask = document.getElementById("rhModalMask"); if (mask) mask.style.display = "none"; }

// ===================== TABS =====================
window.setRhTab = function(tab) {
  RH_STATE.activeTab = tab;
  var pages = { global: document.getElementById("rhPageGlobal"), masse: document.getElementById("rhPageMasse"), conges: document.getElementById("rhPageConges") };
  var btns = { global: document.getElementById("rhTabBtnGlobal"), masse: document.getElementById("rhTabBtnMasse"), conges: document.getElementById("rhTabBtnConges") };
  Object.keys(pages).forEach(function(key){
    if (pages[key]) pages[key].classList.toggle("hidden", key !== tab);
    if (btns[key]) btns[key].classList.toggle("active", key === tab);
  });
  updateBanner_();
};

(function hookRh_(){
  var orig = window.switchTab;
  window.switchTab = function(tabId){ if (typeof orig === "function") orig(tabId); if (tabId === "rh") enterRhMode_(); };
  document.addEventListener("DOMContentLoaded", function(){
    if (document.getElementById("rhEntite")) { setTimeout(function(){ enterRhMode_(); }, 250); }
  });
})();
</script>
