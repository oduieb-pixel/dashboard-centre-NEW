<!-- ============================================================================
     NAV EXPERIENCE  ·  Dashboard Région Centre
     Couche d'expérience de navigation "premium" — 100% surcouche.
     Ne modifie AUCUNE logique métier existante (se greffe sur slimSwitchTab).

     INTÉGRATION (1 seule ligne) : dans Index.html, juste avant </body> :
         <?!= include('nav_experience'); ?>

     Apporte :
       ⌘K / Ctrl+K  → Command Palette (recherche floue modules + actions)
       1..8          → saut direct vers un module
       ?             → aide raccourcis
       • Barre de progression de navigation (haut de page)
       • Indicateur actif animé qui glisse dans la sidebar
       • Tooltips premium au survol des icônes
       • Transition fluide + apparition en cascade des cartes
       • Toast discret de changement de module
       • Bouton "remonter en haut" flottant
     ============================================================================ -->

<style>
  :root{
    --nx-primary:#6366f1; --nx-secondary:#8b5cf6;
    --nx-grad:linear-gradient(135deg,#6366f1 0%,#8b5cf6 100%);
    --nx-ink:#1a1d2e; --nx-sub:#64748b; --nx-muted:#94a3b8;
    --nx-line:#e8ecf4; --nx-soft:#f8f9fc; --nx-card:#ffffff;
    --nx-shadow:0 24px 70px rgba(20,20,60,.22);
  }
  body.dark-mode{
    --nx-ink:#e8ecf4; --nx-sub:#94a3b8; --nx-muted:#64748b;
    --nx-line:#1e293b; --nx-soft:#0f172a; --nx-card:#111827;
    --nx-shadow:0 24px 70px rgba(0,0,0,.6);
  }

  /* ---------- Barre de progression navigation ---------- */
  #nxProgress{
    position:fixed; top:0; left:0; height:3px; width:0;
    background:var(--nx-grad); z-index:99999; border-radius:0 3px 3px 0;
    box-shadow:0 0 12px rgba(99,102,241,.7); opacity:0;
    transition:width .35s cubic-bezier(.4,0,.2,1),opacity .3s;
  }

  /* ---------- Rail actif animé dans la sidebar ---------- */
  #slimSidebar{ position:relative; }
  #nxRail{
    position:absolute; left:6px; width:4px; height:32px; border-radius:6px;
    background:var(--nx-grad); box-shadow:0 0 14px rgba(99,102,241,.6);
    transition:transform .45s cubic-bezier(.34,1.56,.64,1),opacity .3s;
    opacity:0; pointer-events:none; z-index:5;
  }

  /* ---------- Tooltip premium (icônes sidebar) ---------- */
  #nxTip{
    position:fixed; z-index:99998; background:var(--nx-ink); color:#fff;
    padding:8px 12px; border-radius:10px; font:700 .78em 'Plus Jakarta Sans',sans-serif;
    white-space:nowrap; box-shadow:0 10px 30px rgba(20,20,60,.3);
    opacity:0; transform:translateX(-6px) scale(.96); pointer-events:none;
    transition:opacity .16s,transform .16s; display:flex; align-items:center; gap:8px;
  }
  #nxTip .nx-kbd{
    background:rgba(255,255,255,.16); border-radius:5px; padding:1px 7px;
    font-size:.85em; font-weight:800; letter-spacing:.3px;
  }
  #nxTip::before{
    content:''; position:absolute; left:-5px; top:50%; transform:translateY(-50%);
    border:5px solid transparent; border-right-color:var(--nx-ink);
  }

  /* ---------- Toast module ---------- */
  #nxToast{
    position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--nx-card); color:var(--nx-ink); border:1px solid var(--nx-line);
    padding:11px 20px; border-radius:14px; z-index:99997;
    font:700 .85em 'Plus Jakarta Sans',sans-serif; box-shadow:var(--nx-shadow);
    display:flex; align-items:center; gap:11px; opacity:0; pointer-events:none;
    transition:opacity .3s,transform .3s cubic-bezier(.34,1.56,.64,1);
  }
  #nxToast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  #nxToast .nx-toast-ico{
    width:30px; height:30px; border-radius:9px; background:var(--nx-grad);
    color:#fff; display:flex; align-items:center; justify-content:center; font-size:.95em;
  }

  /* ---------- Bouton remonter ---------- */
  #nxTop{
    position:fixed; bottom:26px; right:26px; width:46px; height:46px; border:none;
    border-radius:14px; background:var(--nx-grad); color:#fff; cursor:pointer;
    font-size:1.05em; z-index:99996; box-shadow:0 12px 30px rgba(99,102,241,.4);
    opacity:0; transform:translateY(14px) scale(.9); pointer-events:none;
    transition:opacity .3s,transform .3s cubic-bezier(.34,1.56,.64,1);
  }
  #nxTop.show{ opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }
  #nxTop:hover{ transform:translateY(-3px) scale(1.05); }

  /* ---------- Transition de vue + cascade ---------- */
  @keyframes nxViewIn{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;} }
  .nx-view-enter{ animation:nxViewIn .4s cubic-bezier(.22,1,.36,1); }
  @keyframes nxCardIn{ from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:none;} }
  .nx-card-in{ animation:nxCardIn .5s cubic-bezier(.22,1,.36,1) both; }

  /* ---------- Command Palette ---------- */
  #nxCmdk{
    position:fixed; inset:0; z-index:100000; display:none;
    align-items:flex-start; justify-content:center; padding-top:12vh;
    background:rgba(15,17,34,.5); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
  }
  #nxCmdk.open{ display:flex; animation:nxFade .18s ease; }
  @keyframes nxFade{ from{opacity:0;} to{opacity:1;} }
  #nxPanel{
    width:min(620px,92vw); background:var(--nx-card); border-radius:20px;
    box-shadow:var(--nx-shadow); border:1px solid var(--nx-line); overflow:hidden;
    animation:nxPop .22s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes nxPop{ from{opacity:0; transform:translateY(-14px) scale(.97);} to{opacity:1; transform:none;} }
  .nx-search{ display:flex; align-items:center; gap:12px; padding:16px 20px; border-bottom:1px solid var(--nx-line); }
  .nx-search i{ color:var(--nx-primary); font-size:1.05em; }
  .nx-search input{
    flex:1; border:none; outline:none; background:transparent; color:var(--nx-ink);
    font:600 1.05em 'Plus Jakarta Sans',sans-serif;
  }
  .nx-search input::placeholder{ color:var(--nx-muted); }
  .nx-search .nx-esc{
    font:800 .7em 'Plus Jakarta Sans',sans-serif; color:var(--nx-muted);
    border:1px solid var(--nx-line); border-radius:6px; padding:3px 8px; background:var(--nx-soft);
  }
  #nxResults{ max-height:52vh; overflow-y:auto; padding:8px; }
  .nx-group{ font:800 .66em 'Plus Jakarta Sans',sans-serif; text-transform:uppercase;
    letter-spacing:.6px; color:var(--nx-muted); padding:10px 14px 6px; }
  .nx-item{
    display:flex; align-items:center; gap:14px; padding:11px 14px; border-radius:12px;
    cursor:pointer; transition:background .12s;
  }
  .nx-item .nx-ico{
    width:38px; height:38px; border-radius:11px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:1em;
    background:var(--nx-soft); color:var(--nx-primary); border:1px solid var(--nx-line);
    transition:all .15s;
  }
  .nx-item .nx-txt{ flex:1; min-width:0; }
  .nx-item .nx-title{ font:700 .92em 'Plus Jakarta Sans',sans-serif; color:var(--nx-ink); }
  .nx-item .nx-desc{ font:600 .74em 'Plus Jakarta Sans',sans-serif; color:var(--nx-muted); margin-top:1px; }
  .nx-item .nx-hint{ font:800 .72em 'Plus Jakarta Sans',sans-serif; color:var(--nx-muted);
    border:1px solid var(--nx-line); border-radius:6px; padding:2px 8px; background:var(--nx-soft); }
  .nx-item mark{ background:transparent; color:var(--nx-primary); font-weight:800; }
  .nx-item.active{ background:linear-gradient(135deg,rgba(99,102,241,.1),rgba(139,92,246,.1)); }
  .nx-item.active .nx-ico{ background:var(--nx-grad); color:#fff; border-color:transparent;
    box-shadow:0 6px 16px rgba(99,102,241,.35); }
  .nx-empty{ text-align:center; padding:36px 20px; color:var(--nx-muted);
    font:600 .88em 'Plus Jakarta Sans',sans-serif; }
  .nx-foot{ display:flex; gap:16px; padding:10px 18px; border-top:1px solid var(--nx-line);
    background:var(--nx-soft); font:700 .7em 'Plus Jakarta Sans',sans-serif; color:var(--nx-muted); }
  .nx-foot span{ display:flex; align-items:center; gap:5px; }
  .nx-foot b{ background:var(--nx-card); border:1px solid var(--nx-line); border-radius:5px;
    padding:1px 6px; color:var(--nx-sub); }

  /* Astuce ⌘K dans la topbar */
  #nxHintPill{
    display:flex; align-items:center; gap:7px; background:var(--nx-soft);
    border:1px solid var(--nx-line); border-radius:10px; padding:7px 12px; cursor:pointer;
    font:700 .74em 'Plus Jakarta Sans',sans-serif; color:var(--nx-sub); transition:all .2s;
  }
  #nxHintPill:hover{ border-color:#c7d2fe; background:#f1f0ff; color:var(--nx-primary); }
  #nxHintPill b{ background:var(--nx-card); border:1px solid var(--nx-line); border-radius:5px;
    padding:1px 6px; font-size:.9em; }
  @media(max-width:820px){ #nxHintPill{ display:none; } }

  /* ============================================================
     VERROU DU SHELL — seul le contenu défile (fix scroll)
     La sidebar + la topbar restent fixes ; plus de page qui saute,
     plus de zone morte en bas.  (Desktop uniquement, mobile intact)
     ============================================================ */
  @media(min-width:821px){
    #appContainer{ overflow:hidden !important; }
    .app-layout{ min-height:0 !important; }
    .app-layout > div:last-child{ min-height:0 !important; height:auto !important; }
    .main-content{
      height:100% !important; min-height:0 !important;
      overflow-y:auto !important; overscroll-behavior:contain;
      scroll-behavior:smooth;
    }
    /* Scrollbar premium */
    .main-content::-webkit-scrollbar{ width:10px; }
    .main-content::-webkit-scrollbar-track{ background:transparent; }
    .main-content::-webkit-scrollbar-thumb{
      background:linear-gradient(180deg,#c7cbf5,#b9a7f0); border-radius:20px;
      border:3px solid transparent; background-clip:padding-box;
    }
    .main-content::-webkit-scrollbar-thumb:hover{ background:linear-gradient(180deg,#6366f1,#8b5cf6); background-clip:padding-box; }
    .main-content{ scrollbar-width:thin; scrollbar-color:#c3c7f2 transparent; }
    body.dark-mode .main-content{ scrollbar-color:#3b3f66 transparent; }
    body.dark-mode .main-content::-webkit-scrollbar-thumb{ background:linear-gradient(180deg,#3b3f66,#4c3f7a); background-clip:padding-box; }
  }
  /* Ombre de profondeur sous la topbar quand on défile */
  #topBar{ transition:box-shadow .25s,border-color .25s; }
  #topBar.nx-scrolled{ box-shadow:0 8px 24px rgba(20,20,60,.08); }
  body.dark-mode #topBar.nx-scrolled{ box-shadow:0 8px 24px rgba(0,0,0,.4); }
</style>

<!-- DOM injecté -->
<div id="nxProgress"></div>
<div id="nxRail"></div>
<div id="nxTip"></div>
<div id="nxToast"><div class="nx-toast-ico"><i class="fas fa-bolt"></i></div><span id="nxToastLabel">—</span></div>
<button id="nxTop" title="Remonter en haut"><i class="fas fa-arrow-up"></i></button>

<div id="nxCmdk">
  <div id="nxPanel">
    <div class="nx-search">
      <i class="fas fa-magnifying-glass"></i>
      <input id="nxInput" type="text" placeholder="Rechercher un module ou une action…" autocomplete="off" spellcheck="false">
      <span class="nx-esc">ESC</span>
    </div>
    <div id="nxResults"></div>
    <div class="nx-foot">
      <span><b>↑↓</b> naviguer</span>
      <span><b>↵</b> ouvrir</span>
      <span><b>1–8</b> accès rapide</span>
      <span><b>?</b> aide</span>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';

  /* ---- Modules (alignés sur la sidebar + TAB_LABELS) ---- */
  var MODULES = [
    { tab:'flash',        label:'Flash Activité',        icon:'fa-bolt',                 key:'1', desc:"Activité en temps réel de la région" },
    { tab:'ca-budget',    label:'CA vs Budget',          icon:'fa-chart-line',           key:'2', desc:"Chiffre d'affaires comparé au budget" },
    { tab:'recouvrement', label:'Recouvrement',          icon:'fa-file-invoice-dollar',  key:'3', desc:"Dossiers réglés, soldés & objectifs" },
    { tab:'expedition',   label:'Expédition',            icon:'fa-truck',                key:'4', desc:"Dossiers non expédiés & objectifs" },
    { tab:'depenses',     label:'Dépenses Caisses',      icon:'fa-wallet',               key:'5', desc:"Suivi des dépenses par caisse" },
    { tab:'honoraires',   label:'Honoraires Médecins',   icon:'fa-user-md',              key:'6', desc:"Honoraires et facturation médecins" },
    { tab:'rh',           label:'Ressources Humaines',   icon:'fa-users',                key:'7', desc:"Effectifs, masse salariale & paie" },
    { tab:'achat',        label:'Gestion des Achats',    icon:'fa-shopping-cart',        key:'8', desc:"Consommation, budget & optimisation" }
  ];

  /* ---- Actions rapides ---- */
  var ACTIONS = [
    { label:'Actualiser les données', icon:'fa-sync-alt',   run:function(){ if(typeof updateData==='function') updateData(); },            desc:"Recharger toutes les données" },
    { label:'Exporter',               icon:'fa-download',   run:function(){ if(typeof openGlobalExportModal==='function') openGlobalExportModal(); }, desc:"Ouvrir le module d'export" },
    { label:'Mode sombre / clair',    icon:'fa-moon',       run:function(){ if(typeof toggleDarkMode==='function') toggleDarkMode(); },      desc:"Basculer le thème" },
    { label:'Changer mot de passe',   icon:'fa-key',        run:function(){ if(typeof openChangePassModal==='function') openChangePassModal(); }, desc:"Sécurité du compte" },
    { label:'Se déconnecter',         icon:'fa-sign-out-alt', run:function(){ if(typeof logoutApp==='function') logoutApp(); },              desc:"Fermer la session" },
    { label:'Aide — raccourcis',      icon:'fa-keyboard',   run:function(){ showHelp(); },                                                  desc:"Voir tous les raccourcis clavier" }
  ];

  var $  = function(s){ return document.querySelector(s); };
  var el = { progress:null, rail:null, tip:null, toast:null, top:null, cmdk:null, input:null, results:null };
  var state = { open:false, items:[], sel:0, patched:false };

  /* ============================ INIT ============================ */
  function boot(){
    el.progress = $('#nxProgress'); el.rail = $('#nxRail'); el.tip = $('#nxTip');
    el.toast = $('#nxToast'); el.top = $('#nxTop'); el.cmdk = $('#nxCmdk');
    el.input = $('#nxInput'); el.results = $('#nxResults');
    if(!el.cmdk){ return setTimeout(boot,200); }

    // Ancrer le rail DANS la sidebar (position correcte, indépendant du scroll)
    var side = $('#slimSidebar');
    if(side && el.rail && el.rail.parentNode !== side){ side.appendChild(el.rail); }

    patchNav();
    buildTooltips();
    injectHintPill();
    bindKeyboard();
    bindPalette();
    bindContentScroll();
    // Position initiale du rail sur le module actif
    setTimeout(function(){ moveRail(currentTab()); }, 400);
    setTimeout(countUpView, 1800);   // anime les KPI du 1er écran une fois chargés
    window.addEventListener('resize', function(){ moveRail(currentTab()); });
  }

  /* ==================== WRAP slimSwitchTab ==================== */
  function patchNav(){
    if(state.patched) return;
    if(typeof window.slimSwitchTab !== 'function'){ return setTimeout(patchNav,150); }
    var original = window.slimSwitchTab;
    window.slimSwitchTab = function(tabName, elt){
      startProgress();
      original.apply(this, arguments);      // ← logique métier intacte
      afterSwitch(tabName);
      finishProgress();
    };
    state.patched = true;
  }

  function afterSwitch(tabName){
    moveRail(tabName);
    showToast(tabName);
    animateView();
    setTimeout(countUpView, 360);   // KPI animés une fois la vue rendue
  }

  function currentTab(){
    var active = document.querySelector('.slim-nav-item.active');
    if(active){
      var oc = active.getAttribute('onclick') || '';
      var m = oc.match(/'([^']+)'/);
      if(m) return m[1];
    }
    return 'flash';
  }

  /* ==================== RAIL ACTIF ==================== */
  function moveRail(tabName){
    var side = $('#slimSidebar'); if(!side || !el.rail) return;
    var btn = null;
    document.querySelectorAll('.slim-nav-item').forEach(function(b){
      var oc = b.getAttribute('onclick') || '';
      if(oc.indexOf("'"+tabName+"'") > -1) btn = b;
    });
    if(!btn){ el.rail.style.opacity = '0'; return; }
    var sr = side.getBoundingClientRect(), br = btn.getBoundingClientRect();
    var y = (br.top - sr.top) + (br.height/2) - (el.rail.offsetHeight/2);
    el.rail.style.transform = 'translateY(' + y + 'px)';
    el.rail.style.opacity = '1';
  }

  /* ==================== PROGRESS BAR ==================== */
  var progTimer;
  function startProgress(){
    clearTimeout(progTimer);
    el.progress.style.transition = 'none';
    el.progress.style.width = '0'; el.progress.style.opacity = '1';
    void el.progress.offsetWidth;
    el.progress.style.transition = 'width .4s cubic-bezier(.4,0,.2,1),opacity .3s';
    el.progress.style.width = '75%';
  }
  function finishProgress(){
    el.progress.style.width = '100%';
    progTimer = setTimeout(function(){
      el.progress.style.opacity = '0';
      setTimeout(function(){ el.progress.style.width = '0'; }, 300);
    }, 300);
  }

  /* ==================== TOAST ==================== */
  var toastTimer;
  function showToast(tabName){
    var mod = MODULES.filter(function(m){ return m.tab===tabName; })[0];
    if(!mod) return;
    $('#nxToast .nx-toast-ico').innerHTML = '<i class="fas ' + mod.icon + '"></i>';
    $('#nxToastLabel').textContent = mod.label;
    el.toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ el.toast.classList.remove('show'); }, 1700);
  }

  /* ==================== TRANSITION DE VUE ==================== */
  function animateView(){
    var view = document.querySelector('.view-section.active');
    if(!view) return;
    view.classList.remove('nx-view-enter'); void view.offsetWidth;
    view.classList.add('nx-view-enter');

    var cards = view.querySelectorAll('.stat-card,.kpi-card,.chart-container,.chart-box,.chart-card');
    Array.prototype.slice.call(cards, 0, 14).forEach(function(c,i){
      c.classList.remove('nx-card-in'); void c.offsetWidth;
      c.style.animationDelay = (i*45) + 'ms';
      c.classList.add('nx-card-in');
      setTimeout(function(){ c.classList.remove('nx-card-in'); c.style.animationDelay=''; }, 700 + i*45);
    });
  }

  /* ==================== TOOLTIPS SIDEBAR ==================== */
  function buildTooltips(){
    document.querySelectorAll('.slim-nav-item').forEach(function(btn){
      var oc = btn.getAttribute('onclick') || '';
      var m = oc.match(/'([^']+)'/); var tab = m ? m[1] : '';
      var mod = MODULES.filter(function(x){ return x.tab===tab; })[0];
      var label = mod ? mod.label : (btn.getAttribute('title')||'');
      var key = mod ? mod.key : '';
      btn.removeAttribute('title');
      btn.addEventListener('mouseenter', function(){
        el.tip.innerHTML = '<span>'+label+'</span>' + (key ? '<span class="nx-kbd">'+key+'</span>' : '');
        var r = btn.getBoundingClientRect();
        el.tip.style.top = (r.top + r.height/2 - el.tip.offsetHeight/2) + 'px';
        el.tip.style.left = (r.right + 12) + 'px';
        el.tip.style.opacity = '1';
        el.tip.style.transform = 'translateX(0) scale(1)';
      });
      btn.addEventListener('mouseleave', function(){
        el.tip.style.opacity = '0';
        el.tip.style.transform = 'translateX(-6px) scale(.96)';
      });
    });
  }

  /* ==================== HINT PILL (topbar) ==================== */
  function injectHintPill(){
    var actions = document.querySelector('.topbar-actions');
    if(!actions || document.getElementById('nxHintPill')) return;
    var pill = document.createElement('div');
    pill.id = 'nxHintPill';
    pill.innerHTML = '<i class="fas fa-magnifying-glass" style="color:var(--nx-primary);"></i> Rechercher <b>' + metaKey() + 'K</b>';
    pill.addEventListener('click', openPalette);
    actions.insertBefore(pill, actions.firstChild);
  }
  function metaKey(){ return /Mac|iPhone|iPad/.test(navigator.platform) ? '⌘' : 'Ctrl '; }

  /* ==================== COMMAND PALETTE ==================== */
  function openPalette(){
    state.open = true; el.cmdk.classList.add('open');
    el.input.value = ''; el.input.focus(); render('');
  }
  function closePalette(){
    state.open = false; el.cmdk.classList.remove('open');
  }
  function bindPalette(){
    el.input.addEventListener('input', function(){ render(el.input.value); });
    el.cmdk.addEventListener('mousedown', function(e){ if(e.target===el.cmdk) closePalette(); });
  }

  function fuzzy(q, text){
    q = q.toLowerCase(); text = text.toLowerCase();
    if(!q) return { ok:true, score:0 };
    var qi=0, score=0, streak=0, start=-1;
    for(var i=0;i<text.length && qi<q.length;i++){
      if(text[i]===q[qi]){
        if(start<0) start=i;
        streak++; score += 1 + streak; qi++;
      } else streak=0;
    }
    if(qi<q.length) return { ok:false };
    if(start===0) score += 6;
    return { ok:true, score:score };
  }

  function highlight(text, q){
    if(!q) return esc(text);
    q = q.toLowerCase(); var lo = text.toLowerCase(), out='', qi=0;
    for(var i=0;i<text.length;i++){
      if(qi<q.length && lo[i]===q[qi]){ out += '<mark>'+esc(text[i])+'</mark>'; qi++; }
      else out += esc(text[i]);
    }
    return out;
  }
  function esc(s){ return String(s).replace(/[&<>]/g,function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]; }); }

  function render(q){
    var mods=[], acts=[];
    MODULES.forEach(function(m){
      var r = fuzzy(q, m.label + ' ' + m.desc);
      if(r.ok) mods.push({ type:'module', data:m, score:r.score });
    });
    ACTIONS.forEach(function(a){
      var r = fuzzy(q, a.label + ' ' + a.desc);
      if(r.ok) acts.push({ type:'action', data:a, score:r.score });
    });
    mods.sort(function(a,b){ return b.score-a.score; });
    acts.sort(function(a,b){ return b.score-a.score; });

    state.items = mods.concat(acts); state.sel = 0;
    var html = '';
    if(mods.length){
      html += '<div class="nx-group">Modules</div>';
      mods.forEach(function(it){ html += itemHTML(it, q); });
    }
    if(acts.length){
      html += '<div class="nx-group">Actions</div>';
      acts.forEach(function(it){ html += itemHTML(it, q); });
    }
    if(!state.items.length){
      html = '<div class="nx-empty"><i class="fas fa-ghost" style="opacity:.4;font-size:1.6em;display:block;margin-bottom:10px;"></i>Aucun résultat pour « ' + esc(q) + ' »</div>';
    }
    el.results.innerHTML = html;
    bindItems();
    paintSel();
  }

  function itemHTML(it, q){
    var d = it.data, idx = state.items.indexOf(it);
    var hint = it.type==='module' ? '<span class="nx-hint">'+d.key+'</span>' : '';
    return '<div class="nx-item" data-idx="'+idx+'">' +
             '<div class="nx-ico"><i class="fas '+d.icon+'"></i></div>' +
             '<div class="nx-txt"><div class="nx-title">'+highlight(d.label,q)+'</div>' +
             '<div class="nx-desc">'+esc(d.desc)+'</div></div>' + hint +
           '</div>';
  }

  function bindItems(){
    el.results.querySelectorAll('.nx-item').forEach(function(node){
      node.addEventListener('mouseenter', function(){ state.sel = +node.dataset.idx; paintSel(); });
      node.addEventListener('click', function(){ state.sel = +node.dataset.idx; execSel(); });
    });
  }
  function paintSel(){
    el.results.querySelectorAll('.nx-item').forEach(function(n){
      n.classList.toggle('active', +n.dataset.idx === state.sel);
    });
    var active = el.results.querySelector('.nx-item.active');
    if(active) active.scrollIntoView({ block:'nearest' });
  }
  function move(dir){
    if(!state.items.length) return;
    state.sel = (state.sel + dir + state.items.length) % state.items.length;
    paintSel();
  }
  function execSel(){
    var it = state.items[state.sel]; if(!it) return;
    closePalette();
    setTimeout(function(){
      if(it.type==='module') goTo(it.data.tab);
      else it.data.run();
    }, 80);
  }

  /* ==================== NAVIGATION PROGRAMMATIQUE ==================== */
  function goTo(tab){
    var btn = null;
    document.querySelectorAll('.slim-nav-item').forEach(function(b){
      var oc = b.getAttribute('onclick') || '';
      if(oc.indexOf("'"+tab+"'") > -1) btn = b;
    });
    if(btn) btn.click();
    else if(typeof window.slimSwitchTab==='function') window.slimSwitchTab(tab, null);
  }

  /* ==================== SCROLL (bouton haut + ombre topbar) ==================== */
  function scroller(){
    return document.getElementById('mainContent') || document.querySelector('.main-content') ||
           document.scrollingElement || document.documentElement;
  }
  function bindContentScroll(){
    var topbar = document.getElementById('topBar');
    function onScroll(top){
      el.top.classList.toggle('show', top > 320);
      if(topbar) topbar.classList.toggle('nx-scrolled', top > 8);
    }
    var mc = scroller();
    if(mc && mc.addEventListener){
      mc.addEventListener('scroll', function(){ onScroll(mc.scrollTop||0); }, { passive:true });
    }
    // Filet de sécurité : capte aussi le scroll d'autres conteneurs internes
    document.addEventListener('scroll', function(e){
      var t = e.target;
      if(t && t.scrollTop!=null) onScroll(t.scrollTop);
    }, true);
    el.top.addEventListener('click', function(){
      var s = scroller();
      try{ s.scrollTo({ top:0, behavior:'smooth' }); }catch(_){ s.scrollTop = 0; }
      el.top.classList.remove('show');
    });
  }

  /* ==================== COMPTEUR ANIMÉ DES KPI ==================== */
  function countUpView(){
    var view = document.querySelector('.view-section.active'); if(!view) return;
    var nodes = view.querySelectorAll('.stat-value,.kpi-value');
    Array.prototype.slice.call(nodes, 0, 16).forEach(function(node){
      if(node.offsetParent === null) return;                 // masqué → skip
      var raw = (node.textContent || '').trim();
      var parsed = parseNumber(raw);
      if(!parsed || !isFinite(parsed.value) || parsed.value === 0) return;
      animateCount(node, raw, parsed);
    });
  }

  function parseNumber(str){
    // Isole préfixe / nombre / suffixe.  Ex: "48,2 M", "5 996", "78 %", "32,6 /j"
    var m = str.match(/^([^\d\-]*)(-?[\d  .,\u00A0\u202F]+)(.*)$/);
    if(!m) return null;
    var prefix = m[1], numStr = m[2], suffix = m[3];
    var groupChar = ' ';
    var g = numStr.match(/[\u00A0\u202F ]/); if(g) groupChar = g[0];
    var decimals = 0;
    var dm = numStr.match(/,(\d+)/);          // décimale française = virgule
    if(dm) decimals = dm[1].length;
    var clean = numStr.replace(/[\u00A0\u202F .]/g,'').replace(',', '.');
    var value = parseFloat(clean);
    if(isNaN(value)) return null;
    return { prefix:prefix, suffix:suffix, groupChar:groupChar, decimals:decimals, value:value };
  }

  function formatFR(v, decimals, groupChar){
    var fixed = (decimals>0 ? v.toFixed(decimals) : String(Math.round(v)));
    var parts = fixed.split('.');
    parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, groupChar);
    return decimals>0 ? parts[0] + ',' + (parts[1]||'') : parts[0];
  }

  function animateCount(node, original, p){
    if(node._nxRaf) cancelAnimationFrame(node._nxRaf);
    var start = performance.now(), dur = 900;
    function step(now){
      var t = Math.min(1, (now-start)/dur);
      var e = 1 - Math.pow(1-t, 3);            // easeOutCubic
      node.textContent = p.prefix + formatFR(p.value*e, p.decimals, p.groupChar) + p.suffix;
      if(t < 1){ node._nxRaf = requestAnimationFrame(step); }
      else { node.textContent = original; node._nxRaf = null; }   // restaure l'exact
    }
    node._nxRaf = requestAnimationFrame(step);
  }

  /* ==================== AIDE RACCOURCIS ==================== */
  function showHelp(){
    var rows = MODULES.map(function(m){
      return '<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--nx-line);">' +
             '<span style="color:var(--nx-sub);font-weight:600;"><i class="fas '+m.icon+'" style="color:var(--nx-primary);width:20px;"></i> '+m.label+'</span>' +
             '<b style="background:var(--nx-soft);border:1px solid var(--nx-line);border-radius:5px;padding:2px 9px;color:var(--nx-ink);">'+m.key+'</b></div>';
    }).join('');
    var extra = [['Recherche / Command Palette', metaKey()+'K'],['Aide','?'],['Fermer','Esc']].map(function(r){
      return '<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--nx-line);">' +
             '<span style="color:var(--nx-sub);font-weight:600;">'+r[0]+'</span>' +
             '<b style="background:var(--nx-soft);border:1px solid var(--nx-line);border-radius:5px;padding:2px 9px;color:var(--nx-ink);">'+r[1]+'</b></div>';
    }).join('');
    el.input.value = ''; state.items = [];
    el.cmdk.classList.add('open'); state.open = true;
    el.results.innerHTML = '<div class="nx-group">Accès rapide aux modules</div><div style="padding:0 14px;">'+rows+
      '</div><div class="nx-group" style="margin-top:6px;">Général</div><div style="padding:0 14px 8px;">'+extra+'</div>';
    setTimeout(function(){ el.input.focus(); }, 50);
  }

  /* ==================== CLAVIER ==================== */
  function typing(){
    var a = document.activeElement;
    return a && (a.tagName==='INPUT' || a.tagName==='SELECT' || a.tagName==='TEXTAREA' || a.isContentEditable);
  }
  function bindKeyboard(){
    document.addEventListener('keydown', function(e){
      // ⌘K / Ctrl+K partout
      if((e.metaKey||e.ctrlKey) && (e.key==='k'||e.key==='K')){
        e.preventDefault();
        state.open ? closePalette() : openPalette();
        return;
      }
      if(state.open){
        if(e.key==='Escape'){ e.preventDefault(); closePalette(); }
        else if(e.key==='ArrowDown'){ e.preventDefault(); move(1); }
        else if(e.key==='ArrowUp'){ e.preventDefault(); move(-1); }
        else if(e.key==='Enter'){ e.preventDefault(); execSel(); }
        return;
      }
      if(typing()) return;
      // Chiffres 1..8 → module
      if(/^[1-8]$/.test(e.key)){
        var mod = MODULES.filter(function(m){ return m.key===e.key; })[0];
        if(mod){ e.preventDefault(); goTo(mod.tab); }
      }
      // ? → aide
      else if(e.key==='?'){ e.preventDefault(); showHelp(); }
    });
  }

  /* ==================== LANCEMENT ==================== */
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();
</script>
